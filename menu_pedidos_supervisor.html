<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MANODEOBRA – Solicitud de Pedido</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="config.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:var(--azul);min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:24px;padding:32px 20px}
  :root{--azul:#3860b2;--azul-oscuro:#00126b;--verde:#2e9e4f}

  .header{display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center}
  .badge{background:rgba(255,255,255,0.18);border:1.5px solid rgba(255,255,255,0.35);border-radius:8px;padding:6px 14px;color:white;font-size:20px;font-weight:700;letter-spacing:1px;text-transform:uppercase;display:inline-block}
  .nombre{color:white;font-size:22px;font-weight:700}
  .section-title{color:white;font-family:'Space Mono',monospace;font-size:22px;font-weight:700;letter-spacing:3px;text-transform:uppercase}
  .section-sub{color:rgba(255,255,255,0.65);font-size:13px;margin-top:2px}

  .menu{display:flex;flex-direction:column;gap:16px;width:100%;max-width:360px}
  .btn{display:flex;align-items:center;gap:18px;background:rgba(255,255,255,0.12);border:2px solid rgba(255,255,255,0.25);border-radius:18px;padding:22px 24px;cursor:pointer;transition:all 0.2s;text-align:left;width:100%;color:white;font-family:'DM Sans',sans-serif;text-decoration:none}
  .btn:hover{background:rgba(255,255,255,0.22);border-color:rgba(255,255,255,0.5);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.2)}
  .btn-icon{font-size:38px;flex-shrink:0}
  .btn-label{font-size:18px;font-weight:700;display:block}
  .btn-desc{font-size:12px;color:rgba(255,255,255,0.65);display:block;margin-top:3px}

  .btn-back{background:none;border:1.5px solid rgba(255,255,255,0.3);color:rgba(255,255,255,0.8);font-size:13px;cursor:pointer;padding:9px 20px;border-radius:10px;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:7px;transition:all 0.2s;font-weight:600}
  .btn-back:hover{color:white;background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.6)}
</style>
</head>
<body>

<div class="header">
  <div class="badge">👔 SUPERVISOR</div>
  <div class="nombre" id="sup-nombre">—</div>
  <div class="section-title">SOLICITUD DE PEDIDO</div>
  <div class="section-sub">Selecciona una opción</div>
</div>

<div class="menu">
  <a class="btn" href="crear_requerimiento.html">
    <div class="btn-icon">📝</div>
    <div>
      <span class="btn-label">Nuevo Requerimiento</span>
      <span class="btn-desc">Crear una nueva solicitud de materiales para aprobación</span>
    </div>
  </a>
  <a class="btn" href="mis_requerimientos.html">
    <div class="btn-icon">📋</div>
    <div>
      <span class="btn-label">Mis Requerimientos</span>
      <span class="btn-desc">Ver el estado de todas tus solicitudes enviadas</span>
    </div>
  </a>
</div>

<button class="btn-back" onclick="window.location.href='menu_supervisor.html'">
  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="15 18 9 12 15 6"/>
  </svg>
  Volver al Menú
</button>

<script>
window.onload = () => {
  const user = getSession();
  if (!user) { window.location.href='index.html'; return; }
  if ((user.rol||'').toUpperCase()!=='SUPERVISOR') { window.location.href='index.html'; return; }
  document.getElementById('sup-nombre').textContent = user.nombre;
};
</script>
</body>
</html>
