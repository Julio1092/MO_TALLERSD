<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MANODEOBRA – Ingreso</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="config.js"></script>
<style>
  :root {
    --azul: #3860b2;
    --azul-oscuro: #00126b;
    --borde: #e2e8f0;
    --gris: #4d4d4d;
    --rojo: #e53e3e;
    --verde: #2e9e4f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--azul);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  /* SPLASH */
  #splash {
    position: fixed; inset: 0;
    background: var(--azul);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 20px; z-index: 100;
    transition: opacity 0.5s;
  }
  #splash.hide { opacity: 0; pointer-events: none; }
  .splash-logo {
    width: 110px; height: 110px;
    background: rgba(255,255,255,0.15);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 50px;
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,255,255,0.3); }
    50%       { transform: scale(1.05); box-shadow: 0 0 0 16px rgba(255,255,255,0); }
  }
  .splash-title {
    color: white;
    font-family: 'Space Mono', monospace;
    font-size: 26px; letter-spacing: 4px; font-weight: 700;
  }
  .splash-sub { color: rgba(255,255,255,0.65); font-size: 13px; }

  /* CARD */
  .login-card {
    background: white;
    border-radius: 28px;
    padding: 36px 28px 32px;
    width: 100%; max-width: 400px;
    box-shadow: 0 12px 48px rgba(0,0,0,0.25);
    display: flex; flex-direction: column;
    align-items: center; gap: 20px;
  }

  .card-logo {
    width: 72px; height: 72px;
    background: linear-gradient(135deg, var(--azul), var(--azul-oscuro));
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 34px;
    box-shadow: 0 4px 16px rgba(56,96,178,0.35);
  }

  .card-title {
    font-family: 'Space Mono', monospace;
    font-size: 18px; font-weight: 700;
    color: var(--azul-oscuro);
    text-align: center; letter-spacing: 1px;
  }
  .card-sub {
    font-size: 13px; color: #888;
    text-align: center; line-height: 1.6;
    margin-top: -10px;
  }

  /* INPUT */
  .input-wrap {
    width: 100%;
    position: relative;
  }
  .input-wrap .input-icon {
    position: absolute; left: 14px; top: 50%;
    transform: translateY(-50%);
    font-size: 20px; pointer-events: none;
  }
  .input-codigo {
    width: 100%;
    padding: 16px 16px 16px 48px;
    border: 2px solid var(--borde);
    border-radius: 14px;
    font-size: 22px;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    letter-spacing: 6px;
    color: var(--azul-oscuro);
    text-align: center;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }
  .input-codigo:focus {
    border-color: var(--azul);
    box-shadow: 0 0 0 4px rgba(56,96,178,0.12);
  }
  .input-codigo::placeholder {
    letter-spacing: 2px;
    font-size: 14px;
    color: #ccc;
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
  }

  /* ESTADO */
  .estado-msg {
    font-size: 13px; font-weight: 600;
    text-align: center; min-height: 20px;
    color: #aaa; transition: color 0.2s;
  }
  .estado-msg.error   { color: var(--rojo); }
  .estado-msg.success { color: var(--verde); }
  .estado-msg.loading { color: var(--azul); }

  /* BOTÓN */
  .btn-ingresar {
    width: 100%; padding: 16px;
    background: linear-gradient(135deg, var(--azul), var(--azul-oscuro));
    color: white; border: none; border-radius: 14px;
    font-size: 16px; font-weight: 700;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
    letter-spacing: 0.5px;
    box-shadow: 0 4px 16px rgba(56,96,178,0.4);
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn-ingresar:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
  .btn-ingresar:active:not(:disabled) { transform: translateY(0); }
  .btn-ingresar:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

  /* SPINNER dentro del botón */
  .btn-ingresar .spinner {
    display: inline-block; width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle; margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* NOTIFICACIÓN FLOTANTE */
  .notif {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #2d3748; color: white;
    padding: 14px 26px; border-radius: 14px;
    font-size: 14px; font-weight: 600;
    z-index: 9999; transition: transform 0.3s;
    max-width: 90vw; text-align: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.25);
  }
  .notif.show  { transform: translateX(-50%) translateY(0); }
  .notif.error   { background: var(--rojo); }
  .notif.success { background: var(--verde); }

  /* FOOTER */
  .card-footer {
    font-size: 11px; color: #ccc;
    text-align: center; margin-top: -6px;
  }
</style>
</head>
<body>

<!-- Splash -->
<div id="splash">
  <div class="splash-logo">🔧</div>
  <div class="splash-title">MANODEOBRA</div>
  <div class="splash-sub">Reporte de Mano de Obra</div>
</div>

<!-- Tarjeta de login -->
<div class="login-card">

  <div class="card-logo">🪪</div>

  <div>
    <div class="card-title">INGRESA TU CÓDIGO</div>
  </div>
  <div class="card-sub">Escribe tu código de empleado<br>y presiona <strong>Ingresar</strong></div>

  <div class="input-wrap">
    <span class="input-icon">🔑</span>
    <input
      class="input-codigo"
      type="text"
      id="codigo"
      placeholder="ej. 00123"
      maxlength="10"
      autocomplete="off"
      autocorrect="off"
      spellcheck="false"
      inputmode="text"
      onkeydown="if(event.key==='Enter') login()"
    >
  </div>

  <div class="estado-msg" id="estado"></div>

  <button class="btn-ingresar" id="btn-login" onclick="login()">
    Ingresar
  </button>

  <div class="card-footer">MANODEOBRA · Sistema de Reportes</div>
</div>

<div id="notif" class="notif"></div>

<script>
/* ── Splash ── */
window.addEventListener('load', () => {
  setTimeout(() => {
    document.getElementById('splash').classList.add('hide');
    document.getElementById('codigo').focus();
  }, 1200);
});

/* ── Login ── */
async function login() {
  const input  = document.getElementById('codigo');
  const btn    = document.getElementById('btn-login');
  const estado = document.getElementById('estado');

  const codigoRaw = input.value.trim();
  if (!codigoRaw) {
    shakeInput();
    setEstado('⚠️ Ingresa tu código primero', 'error');
    return;
  }

  const codigo = codigoRaw.slice(0, 10);

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Verificando…';
  setEstado('🔍 Buscando colaborador…', 'loading');

  try {
    const { ok, data } = await supaFetch(
      `Colaboradores?codigo=eq.${encodeURIComponent(codigo)}&select=codigo,nombre,rol,CC`,
      { method: 'GET' }
    );

    if (!ok || !data || data.length === 0) {
      setEstado(`❌ Código "${codigo}" no registrado`, 'error');
      notify(`Código no encontrado`, 'error');
      input.value = '';
      input.focus();
      btn.disabled = false;
      btn.innerHTML = 'Ingresar';
      return;
    }

    const user = data[0];
    setSession(user);
    setEstado(`✅ ¡Bienvenido, ${user.nombre}!`, 'success');
    notify(`¡Bienvenido, ${user.nombre}! 👋`, 'success');

    setTimeout(() => redirigirPorRol(user), 900);

  } catch (e) {
    setEstado('❌ Error de conexión', 'error');
    notify('Error de conexión. Intenta de nuevo.', 'error');
    btn.disabled = false;
    btn.innerHTML = 'Ingresar';
  }
}

function redirigirPorRol(user) {
  const rol = (user.rol || '').toUpperCase();
  if      (rol === 'SUPERVISOR') window.location.href = 'menu_supervisor.html';
  else if (rol === 'CCT')        window.location.href = 'menu_cct.html';
  else if (rol === 'JEFE')       window.location.href = 'menu_jefe.html';
  else if (rol === 'PLANER')     window.location.href = 'menu_planer.html';
  else if (rol === 'PLANNER')    window.location.href = 'menu_planner.html';
  else                           window.location.href = 'menu_mecanico.html';
}

function setEstado(msg, tipo) {
  const el = document.getElementById('estado');
  el.textContent = msg;
  el.className = 'estado-msg ' + (tipo || '');
}

function shakeInput() {
  const inp = document.getElementById('codigo');
  inp.style.animation = 'none';
  inp.style.borderColor = 'var(--rojo)';
  setTimeout(() => { inp.style.borderColor = ''; }, 1200);
}

let nTO;
function notify(msg, type = 'info') {
  const el = document.getElementById('notif');
  el.textContent = msg;
  el.className = 'notif ' + type + ' show';
  clearTimeout(nTO);
  nTO = setTimeout(() => el.classList.remove('show'), 3500);
}
</script>
</body>
</html>
