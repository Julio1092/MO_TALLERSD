<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MANODEOBRA – Reserva de Materiales</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="config.js"></script>
<style>
  :root{--azul:#3860b2;--azul-d:#00126b;--azul-bg:rgba(56,96,178,0.07);--borde:#e2e8f0;--bord2:#bac8e2;--gris:#4d4d4d;--rojo:#e53e3e;--verde:#2e9e4f;--nrj:#c05621;--fondo:#f0f4fb;--shadow:0 2px 16px rgba(56,96,178,0.10)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:var(--fondo);min-height:100vh}
  .topbar{background:var(--azul-d);color:white;display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:58px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,18,107,0.22);gap:10px}
  .tb-left{display:flex;align-items:center;gap:10px;flex:1}
  .tb-title{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;letter-spacing:1px}
  .tb-user{font-size:11px;color:rgba(255,255,255,0.75)}
  .tb-fecha{font-family:'Space Mono',monospace;font-size:12px;font-weight:700;background:rgba(255,255,255,0.13);border:1px solid rgba(255,255,255,0.22);border-radius:8px;padding:5px 12px;color:white;white-space:nowrap}
  .btn-save{background:var(--verde);border:none;color:white;padding:9px 18px;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px;transition:all .2s;white-space:nowrap}
  .btn-save:hover{background:#276040;transform:translateY(-1px)} .btn-save:disabled{opacity:.5;cursor:not-allowed;transform:none}
  .btn-back{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.22);color:white;padding:7px 12px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;transition:all .2s;white-space:nowrap}
  .btn-back:hover{background:rgba(255,255,255,0.22)}
  .content{padding:16px;display:flex;flex-direction:column;gap:16px;max-width:800px;margin:0 auto}
  .card{background:white;border-radius:16px;padding:18px;box-shadow:var(--shadow);border:1.5px solid var(--borde)}
  .card-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--azul);margin-bottom:14px;display:flex;align-items:center;gap:7px}
  .dot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0}
  label.fl{display:block;font-size:12px;font-weight:600;color:var(--gris);margin-bottom:5px}

  /* CANTIDAD — valor por defecto 1 visible */
  .qty-input{width:100%;padding:10px 12px;border:1.5px solid var(--borde);border-radius:8px;font-family:'Space Mono',monospace;font-size:15px;font-weight:700;color:var(--azul-d);text-align:center;background:white;outline:none;-webkit-appearance:none;appearance:none;transition:border-color .2s;-moz-appearance:textfield}
  .qty-input::-webkit-outer-spin-button,.qty-input::-webkit-inner-spin-button{-webkit-appearance:none}
  .qty-input:focus{border-color:var(--azul);box-shadow:0 0 0 3px rgba(56,96,178,.12)}
  .campo-error{border-color:var(--rojo)!important;background:#fff5f5!important}

  /* OT BLOCKS */
  .ot-section{display:flex;flex-direction:column;gap:14px}
  .ot-block{border:1.5px solid var(--borde);border-radius:14px;overflow:visible;animation:slideIn .25s ease;background:white}
  @keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
  .ot-block-hdr{background:#f8fafc;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1.5px solid var(--borde);border-radius:13px 13px 0 0}
  .ot-badge{background:var(--azul-bg);color:var(--azul);border:1px solid var(--bord2);border-radius:20px;padding:3px 12px;font-size:11px;font-weight:700;font-family:'Space Mono',monospace}
  .ot-title-row{display:flex;align-items:center;gap:8px;font-family:'Space Mono',monospace;font-size:12px;font-weight:700;color:var(--azul-d)}
  .btn-remove-ot{background:none;border:none;cursor:pointer;color:#fc8181;font-size:18px;padding:4px 6px;border-radius:6px;transition:all .15s}
  .btn-remove-ot:hover{color:var(--rojo);background:#fff0f0}
  .ot-input-row{padding:14px 16px;border-bottom:1.5px solid var(--borde)}
  .ot-num{width:100%;padding:11px 14px;border:1.5px solid var(--borde);border-radius:8px;font-family:'Space Mono',monospace;font-size:18px;font-weight:700;color:var(--azul-d);background:white;outline:none;transition:border-color .2s;-moz-appearance:textfield;appearance:textfield}
  .ot-num::-webkit-outer-spin-button,.ot-num::-webkit-inner-spin-button{-webkit-appearance:none}
  .ot-num:focus{border-color:var(--azul);box-shadow:0 0 0 3px rgba(56,96,178,.12)}
  .ot-num.valido{border-color:var(--azul);background:#f0f7ff} .ot-num.invalido{border-color:var(--rojo)}

  /* LINES */
  .lines-wrap{padding:12px 16px 4px;display:flex;flex-direction:column;gap:10px}
  .linea{display:flex;flex-direction:column;gap:8px;padding:12px;background:#fafbff;border:1.5px solid #eef0f8;border-radius:10px;animation:slideIn .2s ease}
  .linea-row2{display:grid;grid-template-columns:1fr 90px 36px;gap:8px;align-items:end}
  .linea-num{font-family:'Space Mono',monospace;font-size:10px;font-weight:700;color:white;background:var(--azul);border-radius:20px;padding:2px 8px;display:inline-block;margin-bottom:4px}
  .um-box{padding:10px 8px;background:#edf2ff;border:1.5px solid #c3d0f0;border-radius:8px;font-size:12px;font-weight:700;color:var(--azul-d);font-family:'Space Mono',monospace;text-align:center;min-height:42px;display:flex;align-items:center;justify-content:center}
  .btn-add-line{display:flex;align-items:center;gap:7px;background:#e8faf3;border:2px dashed #2c9e7a;border-radius:10px;padding:10px 14px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;color:#1a6e54;transition:all .2s;margin:6px 16px 14px}
  .btn-add-line:hover{background:#c6f0e0;border-color:#1a6e54}
  .btn-add-ot{display:flex;align-items:center;gap:8px;background:var(--azul-bg);border:2px dashed var(--bord2);border-radius:12px;padding:14px 18px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;color:var(--azul);width:100%;transition:all .2s}
  .btn-add-ot:hover{background:rgba(56,96,178,.14);border-color:var(--azul)}
  .btn-del-line{background:none;border:1.5px solid #fed7d7;border-radius:7px;color:#fc8181;cursor:pointer;font-size:14px;width:36px;height:42px;display:flex;align-items:center;justify-content:center;transition:all .15s;padding:0;flex-shrink:0}
  .btn-del-line:hover{background:#fff5f5;border-color:var(--rojo);color:var(--rojo)}

  /* SEARCHABLE */
  .ss-wrap{position:relative;width:100%}
  .ss-input{width:100%;padding:10px 30px 10px 12px;border:1.5px solid var(--borde);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;color:#222;background:white;outline:none;transition:border-color .2s}
  .ss-input:focus{border-color:var(--azul);box-shadow:0 0 0 3px rgba(56,96,178,.12)}
  .ss-input.campo-error{border-color:var(--rojo)!important;background:#fff5f5!important}
  .ss-arrow{position:absolute;right:9px;top:50%;transform:translateY(-50%);font-size:11px;color:#bbb;pointer-events:none}
  .ss-dropdown{display:none;position:absolute;top:calc(100% + 3px);left:0;right:0;background:white;border:1.5px solid var(--azul);border-radius:10px;box-shadow:0 8px 24px rgba(56,96,178,.18);z-index:600;max-height:210px;overflow-y:auto}
  .ss-dropdown.open{display:block}
  .ss-option{padding:9px 13px;font-size:12px;cursor:pointer;color:#222;transition:background .1s;border-bottom:1px solid #f0f2f8;display:flex;justify-content:space-between;align-items:center;gap:8px}
  .ss-option:last-child{border-bottom:none}
  .ss-option:hover,.ss-option.hi{background:var(--azul-bg);color:var(--azul)}
  .ss-match{font-weight:700;color:var(--azul)}
  .ss-cod{font-family:'Space Mono',monospace;font-size:10px;color:#999;flex-shrink:0}
  .ss-empty{padding:10px 13px;font-size:12px;color:#aaa;font-style:italic}

  /* OVERLAYS */
  #saving-overlay{display:none;position:fixed;inset:0;background:rgba(56,96,178,.18);backdrop-filter:blur(3px);z-index:8000;align-items:center;justify-content:center;flex-direction:column;gap:16px}
  #saving-overlay.show{display:flex}
  .spinner{width:48px;height:48px;border:4px solid rgba(255,255,255,.4);border-top-color:white;border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .saving-txt{color:white;font-weight:700;font-size:16px}
  #success-overlay{display:none;position:fixed;inset:0;background:var(--fondo);z-index:500;flex-direction:column;align-items:center;justify-content:center;gap:12px}
  #success-overlay.show{display:flex}
  .suc-icon{font-size:80px}.suc-title{color:var(--verde);font-size:26px;font-weight:700}.suc-sub{color:var(--gris);font-size:15px}
  .notif{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#2d3748;color:white;padding:13px 22px;border-radius:12px;font-size:13px;font-weight:600;box-shadow:0 8px 28px rgba(0,0,0,.22);z-index:9999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);max-width:90vw;text-align:center}
  .notif.show{transform:translateX(-50%) translateY(0)} .notif.error{background:var(--rojo)} .notif.warning{background:var(--nrj)} .notif.success{background:var(--verde)}
  @media(max-width:640px){.linea-row2{grid-template-columns:1fr 70px 36px}}
</style>
</head>
<body>

<div id="saving-overlay"><div class="spinner"></div><div class="saving-txt">Enviando reserva…</div></div>
<div id="success-overlay">
  <div class="suc-icon">✅</div>
  <div class="suc-title">¡Reserva Enviada!</div>
  <div class="suc-sub">Tu solicitud fue enviada al supervisor</div>
  <div style="font-size:13px;color:#999;margin-top:4px">Regresando al menú…</div>
</div>

<div class="topbar">
  <div class="tb-left">
    <button class="btn-back" onclick="irAlMenu()">← Menú</button>
    <div>
      <div class="tb-title">Reserva de Materiales</div>
      <div class="tb-user" id="tb-user"></div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="tb-fecha" id="tb-fecha"></div>
    <button class="btn-save" id="btn-guardar" onclick="guardar()">💾 Enviar</button>
  </div>
</div>

<div class="content">
  <div class="card">
    <div class="card-label"><span class="dot"></span> Órdenes de Trabajo y Materiales</div>
    <div class="ot-section" id="ot-section"></div>
    <button class="btn-add-ot" onclick="agregarOT()">＋ Agregar otra Orden de Trabajo</button>
  </div>
</div>
<div id="notif" class="notif"></div>

<script>
const SB_URL='https://rzcfrjgwxhgwslwvtbbe.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ6Y2Zyamd3eGhnd3Nsd3Z0YmJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MzA2NjIsImV4cCI6MjA4ODMwNjY2Mn0.hWg2jS8q_X6xIbfMIYGU7Bp7JcJhpYbQwJEB4ZaSjrs';
async function sbGet(p){const r=await fetch(`${SB_URL}/rest/v1/${p}`,{headers:{apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`}});if(!r.ok)throw new Error(await r.text());return r.json();}
async function sbPost(t,b){const r=await fetch(`${SB_URL}/rest/v1/${t}`,{method:'POST',headers:{apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`,'Content-Type':'application/json',Prefer:'return=minimal'},body:JSON.stringify(b)});if(!r.ok)throw new Error(await r.text());}

let userActual=null, articulos=[], otIds=[], nextOT=1, nextLine=1;
const hoy=isoHoy();

function irAlMenu(){
  const rol=(userActual?.rol||'').toUpperCase();
  if(rol==='SUPERVISOR') window.location.href='menu_supervisor.html';
  else if(rol==='CCT') window.location.href='menu_cct.html';
  else window.location.href='menu_mecanico.html';
}

window.onload=async()=>{
  userActual=getSession();
  if(!userActual){window.location.href='index.html';return;}
  document.getElementById('tb-user').textContent=`👷 ${userActual.nombre}`;
  const d=new Date(hoy+'T12:00:00');
  document.getElementById('tb-fecha').textContent=d.toLocaleDateString('es-GT',{day:'2-digit',month:'short',year:'numeric'});
  await cargarArticulos();
  agregarOT();
};

async function cargarArticulos(){
  try{
    articulos=await sbGet('Articulos_SAP?select=ArticuloSAP,Descripcion,UM&order=Descripcion.asc');
  }catch(e){console.warn('SAP:',e.message);notify('No se pudieron cargar los artículos','warning');}
}

/* OT */
function agregarOT(){
  const id=nextOT++;otIds.push(id);
  const sec=document.getElementById('ot-section');
  const div=document.createElement('div');div.className='ot-block';div.id=`ot-${id}`;
  div.innerHTML=`
    <div class="ot-block-hdr">
      <div class="ot-title-row"><span class="ot-badge" id="ot-badge-${id}">OT #${otIds.length}</span> Orden de Trabajo</div>
      <button class="btn-remove-ot" onclick="eliminarOT(${id})">✕</button>
    </div>
    <div class="ot-input-row">
      <label class="fl">Número de OT <span style="font-weight:400;color:#aaa;font-size:11px">(6 dígitos)</span></label>
      <input class="ot-num" id="otn-${id}" type="number" placeholder="000000" oninput="validarOTNum(this)">
    </div>
    <div class="lines-wrap" id="lines-${id}"></div>
    <button class="btn-add-line" onclick="agregarLinea(${id})">＋ &nbsp;Agregar Artículo</button>`;
  sec.appendChild(div);
  agregarLinea(id);
  setTimeout(()=>document.getElementById(`otn-${id}`)?.focus(),60);
}

function eliminarOT(id){
  if(otIds.length<=1){notify('Debe quedar al menos una OT','warning');return;}
  document.getElementById(`ot-${id}`)?.remove();
  otIds=otIds.filter(x=>x!==id);
  otIds.forEach((oid,i)=>{const b=document.getElementById(`ot-badge-${oid}`);if(b)b.textContent=`OT #${i+1}`;});
}

function validarOTNum(el){
  let v=el.value.replace(/\D/g,'');if(v.length>6)v=v.slice(0,6);el.value=v;
  el.classList.remove('valido','invalido','campo-error');
  if(!v)return;v.length===6?el.classList.add('valido'):el.classList.add('invalido');
}

/* LINES */
function agregarLinea(otId){
  const lid=nextLine++;
  const wrap=document.getElementById(`lines-${otId}`);if(!wrap)return;
  const num=wrap.querySelectorAll('.linea').length+1;
  const div=document.createElement('div');div.className='linea';div.id=`lin-${lid}`;
  div.innerHTML=`
    <div style="display:flex;flex-direction:column;gap:3px">
      <span class="linea-num">#${num}</span>
      <label class="fl">Artículo</label>
      <div class="ss-wrap">
        <input class="ss-input" id="art-${lid}" type="text" placeholder="Buscar descripción o código SAP…" autocomplete="off"
          oninput="artFilter(${lid})" onfocus="artOpen(${lid})" onblur="artBlur(${lid})" onkeydown="artKey(event,${lid})">
        <span class="ss-arrow">▾</span>
        <div class="ss-dropdown" id="art-dd-${lid}"></div>
        <input type="hidden" id="art-cod-${lid}">
      </div>
    </div>
    <div class="linea-row2">
      <div style="display:flex;flex-direction:column;gap:3px">
        <label class="fl">Cantidad</label>
        <input class="qty-input" type="number" id="qty-${lid}" min="0.01" step="0.01" value="1">
      </div>
      <div style="display:flex;flex-direction:column;gap:3px">
        <label class="fl">UM</label>
        <div class="um-box" id="um-${lid}">—</div>
      </div>
      <div style="display:flex;flex-direction:column;justify-content:flex-end">
        <button class="btn-del-line" onclick="eliminarLinea(${lid},${otId})">✕</button>
      </div>
    </div>`;
  wrap.appendChild(div);
}

function eliminarLinea(lid,otId){
  const wrap=document.getElementById(`lines-${otId}`);
  if(wrap?.querySelectorAll('.linea').length<=1){notify('Debe quedar al menos un artículo por OT','warning');return;}
  document.getElementById(`lin-${lid}`)?.remove();
  wrap.querySelectorAll('.linea-num').forEach((el,i)=>el.textContent=`#${i+1}`);
}

/* SEARCHABLE ARTICULOS */
function artRender(lid,q){
  const dd=document.getElementById(`art-dd-${lid}`);if(!dd)return;
  const qL=(q||'').toLowerCase().trim();
  const fil=qL?articulos.filter(a=>(a.Descripcion||'').toLowerCase().includes(qL)||String(a.ArticuloSAP||'').includes(qL)):articulos;
  if(!fil.length){dd.innerHTML='<div class="ss-empty">Sin resultados</div>';return;}
  dd.innerHTML=fil.slice(0,60).map((a,i)=>{
    let desc=String(a.Descripcion||''),cod=String(a.ArticuloSAP||'');
    if(qL){const hl=s=>{const p=s.toLowerCase().indexOf(qL);return p>=0?s.slice(0,p)+`<span class="ss-match">${s.slice(p,p+qL.length)}</span>`+s.slice(p+qL.length):s;};desc=hl(desc);cod=hl(cod);}
    return `<div class="ss-option" data-idx="${i}" data-cod="${a.ArticuloSAP}" data-desc="${a.Descripcion}" data-um="${a.UM||''}"
      onmousedown="artSelect(${lid},this)"><span>${desc}</span><span class="ss-cod">${cod}</span></div>`;
  }).join('');
}
function artOpen(lid){artRender(lid,document.getElementById(`art-${lid}`)?.value);document.getElementById(`art-dd-${lid}`)?.classList.add('open');}
function artBlur(lid){setTimeout(()=>document.getElementById(`art-dd-${lid}`)?.classList.remove('open'),200);}
function artFilter(lid){
  document.getElementById(`art-cod-${lid}`).value='';
  document.getElementById(`um-${lid}`).textContent='—';
  document.getElementById(`art-${lid}`)?.classList.remove('campo-error');
  artRender(lid,document.getElementById(`art-${lid}`)?.value);
  document.getElementById(`art-dd-${lid}`)?.classList.add('open');
}
function artSelect(lid,el){
  document.getElementById(`art-${lid}`).value=el.dataset.desc;
  document.getElementById(`art-cod-${lid}`).value=el.dataset.cod;
  document.getElementById(`um-${lid}`).textContent=el.dataset.um||'—';
  document.getElementById(`art-dd-${lid}`)?.classList.remove('open');
  document.getElementById(`art-${lid}`)?.classList.remove('campo-error');
  document.getElementById(`qty-${lid}`)?.focus();
}
function artKey(event,lid){
  const dd=document.getElementById(`art-dd-${lid}`);if(!dd||!dd.classList.contains('open'))return;
  const opts=dd.querySelectorAll('.ss-option');let cur=dd.querySelector('.ss-option.hi');let idx=cur?parseInt(cur.dataset.idx):-1;
  if(event.key==='ArrowDown'){event.preventDefault();cur?.classList.remove('hi');idx=Math.min(idx+1,opts.length-1);opts[idx]?.classList.add('hi');opts[idx]?.scrollIntoView({block:'nearest'});}
  else if(event.key==='ArrowUp'){event.preventDefault();cur?.classList.remove('hi');idx=Math.max(idx-1,0);opts[idx]?.classList.add('hi');opts[idx]?.scrollIntoView({block:'nearest'});}
  else if(event.key==='Enter'){event.preventDefault();if(cur)artSelect(lid,cur);else if(opts.length===1)artSelect(lid,opts[0]);}
  else if(event.key==='Escape')dd.classList.remove('open');
}

/* GUARDAR */
async function guardar(){
  const filas=[];let hayError=false;
  for(const oid of otIds){
    const otEl=document.getElementById(`otn-${oid}`);
    const otVal=otEl?.value.trim();
    if(!otVal||otVal.length!==6){otEl?.classList.add('campo-error');notify('Todas las OTs deben tener 6 dígitos','error');otEl?.scrollIntoView({behavior:'smooth',block:'center'});hayError=true;break;}
    otEl?.classList.remove('campo-error');
    for(const lin of (document.getElementById(`lines-${oid}`)?.querySelectorAll('.linea')||[])){
      const lid=lin.id.replace('lin-','');
      const cod=document.getElementById(`art-cod-${lid}`)?.value?.trim();
      const desc=document.getElementById(`art-${lid}`)?.value?.trim();
      const um=document.getElementById(`um-${lid}`)?.textContent?.trim();

      // ── Cantidad: si el campo está vacío o es 0, usar 1 como default ──
      const qtyRaw=document.getElementById(`qty-${lid}`)?.value;
      const qty=(!qtyRaw||parseFloat(qtyRaw)<=0)?1:parseFloat(qtyRaw);

      if(!cod||!desc){document.getElementById(`art-${lid}`)?.classList.add('campo-error');notify('Selecciona un artículo válido en todas las líneas','error');document.getElementById(`art-${lid}`)?.scrollIntoView({behavior:'smooth',block:'center'});hayError=true;break;}
      document.getElementById(`qty-${lid}`)?.classList.remove('campo-error');
      filas.push({fecha_reserva:hoy,ot:otVal,articulosap:cod,descripcion:desc,cantidad:qty,um:um==='—'?null:um,codigo_operario:String(userActual.codigo),sup_aprueba:false});
    }
    if(hayError)break;
  }
  if(hayError)return;
  if(!filas.length){notify('Agrega al menos un artículo','warning');return;}
  document.getElementById('btn-guardar').disabled=true;
  document.getElementById('saving-overlay').classList.add('show');
  try{
    await sbPost('reservas',filas);
    document.getElementById('saving-overlay').classList.remove('show');
    document.getElementById('success-overlay').classList.add('show');
    // Espera 2.5 s mostrando el éxito y luego va al menú
    setTimeout(()=>irAlMenu(), 2500);
  }catch(e){
    document.getElementById('saving-overlay').classList.remove('show');
    document.getElementById('btn-guardar').disabled=false;
    notify(`Error: ${e.message}`,'error');
  }
}

let nTO;
function notify(msg,type='info'){const el=document.getElementById('notif');el.textContent=msg;el.className='notif '+type;void el.offsetWidth;el.classList.add('show');clearTimeout(nTO);nTO=setTimeout(()=>el.classList.remove('show'),5000);}
</script>
