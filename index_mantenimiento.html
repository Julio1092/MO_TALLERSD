<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MANODEOBRA – Mantenimiento</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',sans-serif;background:#00126b;min-height:100vh;display:flex;align-items:center;justify-content:center;}
  .card{background:white;border-radius:20px;padding:48px 36px;text-align:center;max-width:360px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
  .icon{font-size:64px;margin-bottom:20px;}
  .title{font-size:22px;font-weight:700;color:#00126b;margin-bottom:10px;letter-spacing:1px;}
  .sub{font-size:14px;color:#666;line-height:1.6;}
  .badge{display:inline-block;margin-top:24px;background:#f0f4fb;color:#3860b2;border:1.5px solid #bac8e2;border-radius:20px;padding:6px 18px;font-size:12px;font-weight:700;letter-spacing:1px;}
</style>
</head>
<body>
  <div class="card">
    <div class="icon">🔧</div>
    <div class="title">MANODEOBRA</div>
    <div class="sub">El sistema está en mantenimiento.<br>Volveremos en unos momentos.</div>
    <div class="badge">⏳ EN MANTENIMIENTO</div>
  </div>
</body>
</html>
