<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MANODEOBRA – CCT</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="config.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:#553c9a;min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:32px;padding:32px 20px}
  :root{--lila:#553c9a;--lila-d:#2d1f5e}
  .badge{background:rgba(255,255,255,0.18);border:1.5px solid rgba(255,255,255,0.35);border-radius:8px;padding:6px 14px;color:rgba(255,255,255,0.9);font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;display:inline-block}
  .title{font-family:'Space Mono',monospace;color:white;font-size:22px;font-weight:700;letter-spacing:2px;margin:16px 0 6px;text-align:center}
  .name{color:rgba(255,255,255,0.75);font-size:14px;text-align:center}
  .menu{display:flex;flex-direction:column;gap:16px;width:100%;max-width:360px}
  .btn{display:flex;align-items:center;gap:18px;background:rgba(255,255,255,0.12);border:2px solid rgba(255,255,255,0.25);border-radius:18px;padding:22px 24px;cursor:pointer;transition:all 0.2s;text-align:left;width:100%;color:white;font-family:'DM Sans',sans-serif;text-decoration:none}
  .btn:hover{background:rgba(255,255,255,0.22);border-color:rgba(255,255,255,0.5);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.2)}
  .btn-icon{font-size:38px;flex-shrink:0}
  .btn-label{font-size:18px;font-weight:700;display:block}
  .btn-desc{font-size:12px;color:rgba(255,255,255,0.65);display:block;margin-top:3px}
  .btn-logout{background:none;border:none;color:rgba(255,255,255,0.55);font-size:13px;cursor:pointer;padding:8px 16px;border-radius:8px;font-family:'DM Sans',sans-serif}
  .btn-logout:hover{color:white;background:rgba(255,0,0,0.2)}
  .btn-mps{background:rgba(255,215,0,0.15);border-color:rgba(255,215,0,0.5)}
  .btn-mps:hover{background:rgba(255,215,0,0.28);border-color:rgba(255,215,0,0.85)}
  .divider{width:100%;max-width:360px;display:flex;align-items:center;gap:10px}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.2)}
  .divider span{font-size:11px;color:rgba(255,255,255,0.4);font-family:'Space Mono',monospace;letter-spacing:1px}
</style>
</head>
<body>
<div style="text-align:center">
  <div class="badge">📊 CCT</div>
  <div class="title">MANODEOBRA</div>
  <div class="name" id="nombre">—</div>
</div>

<div class="menu">
  <a class="btn" href="grabar.html">
    <div class="btn-icon">📝</div>
    <div>
      <span class="btn-label">Reportar MO</span>
      <span class="btn-desc">Registrar actividades de mano de obra</span>
    </div>
  </a>
  <a class="btn" href="ver_mo.html">
    <div class="btn-icon">📋</div>
    <div>
      <span class="btn-label">Ver Mano de Obra</span>
      <span class="btn-desc">Consultar registros autorizados por el supervisor</span>
    </div>
  </a>
  <a class="btn" href="ver_reservas.html">
    <div class="btn-icon">📦</div>
    <div>
      <span class="btn-label">Ver Reservas</span>
      <span class="btn-desc">Consultar reservas de materiales aprobadas</span>
    </div>
  </a>
  <a class="btn" href="ver_ots_cct.html" style="background:rgba(255,215,0,0.15);border-color:rgba(255,215,0,0.5)">
    <div class="btn-icon">🔧</div>
    <div>
      <span class="btn-label">Órdenes de Trabajo</span>
      <span class="btn-desc">Grabar N° de orden en SAP</span>
    </div>
  </a>
</div>

<button class="btn-logout" onclick="cerrar()">🚪 Cerrar sesión</button>

<script>
window.onload = () => {
  const u = getSession();
  if (!u) { window.location.href='index.html'; return; }
  if ((u.rol||'').toUpperCase()!=='CCT') { window.location.href='index.html'; return; }
  document.getElementById('nombre').textContent = u.nombre;
};
function cerrar(){ clearSession(); window.location.href='index.html'; }
</script>
</body>
</html>
