<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MANODEOBRA – Mis Requerimientos</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="config.js"></script>
<style>
:root{--azul:#3860b2;--azul-d:#00126b;--azul-bg:rgba(56,96,178,0.07);--borde:#e2e8f0;--bord2:#bac8e2;--rojo:#e53e3e;--verde:#2e9e4f;--nrj:#c05621;--fondo:#f0f4fb;--shadow:0 2px 16px rgba(56,96,178,0.10)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"DM Sans",sans-serif;background:var(--fondo);min-height:100vh}

.topbar{background:var(--azul-d);color:white;display:flex;align-items:center;padding:0 20px;height:58px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,18,107,0.22);gap:12px}
.tb-logo{font-family:"Space Mono",monospace;font-weight:700;font-size:13px;letter-spacing:2px;color:white;flex:1}
.btn-back{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.22);color:white;padding:7px 12px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;transition:all .2s}
.btn-back:hover{background:rgba(255,255,255,0.22)}
.btn-nueva{background:var(--verde);color:white;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;white-space:nowrap;transition:all .2s}
.btn-nueva:hover{background:#276040}

.page{max-width:860px;margin:0 auto;padding:24px 16px;display:flex;flex-direction:column;gap:20px}

/* FILTROS */
.filtros{background:white;border:1.5px solid var(--borde);border-radius:14px;padding:16px 20px;display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;box-shadow:var(--shadow)}
.f-grp{display:flex;flex-direction:column;gap:4px}
.f-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#718096}
.f-inp{padding:9px 12px;border:1.5px solid var(--borde);border-radius:8px;font-family:"DM Sans",sans-serif;font-size:13px;color:#222;outline:none;background:white;width:150px;transition:border-color .2s}
.f-inp:focus{border-color:var(--azul)}
.btn-buscar{padding:10px 22px;background:var(--azul);color:white;border:none;border-radius:9px;font-family:"DM Sans",sans-serif;font-size:13px;font-weight:700;cursor:pointer;align-self:flex-end;transition:all .2s}
.btn-buscar:hover{background:var(--azul-d)}

/* TABS */
.tabs-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.tabs{display:flex;gap:6px;flex-wrap:wrap;flex:1}
.tab{padding:8px 16px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid var(--borde);background:white;color:#718096;font-family:"DM Sans",sans-serif;white-space:nowrap;transition:all .15s}
.tab:hover{border-color:var(--azul);color:var(--azul)}
.tab.active{background:var(--azul);color:white;border-color:var(--azul)}
.tab.t-pend.active{background:#92400e;border-color:#92400e}
.tab.t-grab.active{background:#1E40AF;border-color:#1E40AF}
.tab.t-comp.active{background:#6B21A8;border-color:#6B21A8}
.tab.t-rech.active{background:var(--rojo);border-color:var(--rojo)}
.cnt{font-family:"Space Mono",monospace;font-size:11px;color:#718096;white-space:nowrap}

/* REQ CARD */
.req-card{background:white;border:1.5px solid var(--borde);border-radius:16px;overflow:hidden;box-shadow:var(--shadow);transition:box-shadow .2s}
.req-card:hover{box-shadow:0 4px 24px rgba(56,96,178,0.15)}

.req-hdr{padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;background:#f8fafc;border-bottom:1.5px solid var(--borde)}
.req-hdr-left{display:flex;flex-direction:column;gap:3px}
.req-id{font-family:"Space Mono",monospace;font-size:13px;font-weight:700;color:var(--azul-d)}
.req-fecha{font-size:11px;color:#718096;font-family:"Space Mono",monospace;margin-top:1px}
.badges{display:flex;gap:6px;align-items:center;flex-wrap:wrap}

.badge{display:inline-flex;padding:4px 12px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.5px;font-family:"Space Mono",monospace;white-space:nowrap}
.b-pend{background:#FEF3C7;color:#92400E;border:1px solid #FDE68A}
.b-grab{background:#DBEAFE;color:#1E40AF;border:1px solid #93C5FD}
.b-compras{background:#F3E8FF;color:#6B21A8;border:1px solid #D8B4FE}
.b-rech{background:#FEE2E2;color:#7F1D1D;border:1px solid #FCA5A5}
.b-c1{background:#F3F4F6;color:#374151;border:1px solid #D1D5DB}
.b-c2{background:#FEF3C7;color:#B45309;border:1px solid #FDE68A}
.b-c3{background:#FEE2E2;color:#9B1C1C;border:1px solid #FCA5A5}
.b-c4{background:#7F1D1D;color:white;border:1px solid #991B1B}

/* LINEAS */
.lineas-wrap{padding:4px 0}
.lin-row{display:grid;grid-template-columns:60px 1fr;gap:14px;padding:13px 20px;border-bottom:1px solid #f0f2f8;align-items:start}
.lin-row:last-child{border-bottom:none}
.lin-qty-wrap{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:2px}
.lin-qty{font-family:"Space Mono",monospace;font-size:20px;font-weight:700;color:var(--azul-d);line-height:1}
.lin-um{font-size:9px;color:#a0aec0;font-family:"Space Mono",monospace;text-align:center;margin-top:2px}
.lin-body{display:flex;flex-direction:column;gap:3px}
.lin-desc{font-weight:600;color:#1a202c;font-size:13px;line-height:1.4}
.lin-uso{font-size:11px;color:#a0aec0;font-style:italic}

/* NOTAS POR LÍNEA */
.lin-notas{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.nota-jefe-lin{display:flex;align-items:flex-start;gap:7px;padding:8px 12px;background:#FFFBEB;border:1.5px solid #FDE68A;border-radius:8px;font-size:11px;color:#92400E;line-height:1.5}
.cant-jefe-lin{display:flex;align-items:center;gap:7px;padding:7px 12px;background:#D1FAE5;border:1px solid #6EE7B7;border-radius:8px;font-size:11px;color:#065F46;font-weight:700}

/* EMPTY */
.estado-empty{padding:56px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px}
.e-ico{font-size:48px;opacity:.3}
.e-txt{font-family:"Space Mono",monospace;font-size:13px;color:#718096;font-weight:700}
.e-sub{font-size:12px;color:#a0aec0}

.spin{display:inline-block;width:18px;height:18px;border:2.5px solid rgba(56,96,178,.2);border-top-color:var(--azul);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.notif{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#2d3748;color:white;padding:12px 22px;border-radius:12px;font-size:13px;font-weight:600;z-index:9999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);max-width:90vw;text-align:center}
.notif.show{transform:translateX(-50%) translateY(0)}.notif.error{background:var(--rojo)}.notif.success{background:var(--verde)}

  #cont{display:flex;flex-direction:column;gap:16px}
</style>
</head>
<body>

<div class="topbar">
  <button class="btn-back" onclick="window.location.href='menu_pedidos_supervisor.html'">← Pedidos</button>
  <div class="tb-logo">MIS REQUERIMIENTOS</div>
  <button class="btn-nueva" onclick="window.location.href='crear_requerimiento.html'">＋ Nuevo</button>
</div>

<div class="page">

  <div class="filtros">
    <div class="f-grp">
      <label class="f-lbl">Desde</label>
      <input type="date" class="f-inp" id="f-desde">
    </div>
    <div class="f-grp">
      <label class="f-lbl">Hasta</label>
      <input type="date" class="f-inp" id="f-hasta">
    </div>
    <button class="btn-buscar" onclick="cargar()">🔍 Buscar</button>
  </div>

  <div class="tabs-row">
    <div class="tabs">
      <button class="tab active"  data-t="todos"     onclick="setTab('todos')">Todas</button>
      <button class="tab t-pend"  data-t="Pendiente" onclick="setTab('Pendiente')">⏳ Pend. Autorización</button>
      <button class="tab t-grab"  data-t="Aprobado"  onclick="setTab('Aprobado')">📋 Pend. Grabación</button>
      <button class="tab t-comp"  data-t="Confirmado" onclick="setTab('Confirmado')">🛒 Pend. Compras</button>
      <button class="tab t-rech"  data-t="Rechazado" onclick="setTab('Rechazado')">❌ Rechazadas</button>
    </div>
    <span class="cnt" id="cnt"></span>
  </div>

  <div id="cont">
    <div class="estado-empty">
      <div class="spin"></div>
      <div class="e-txt" style="margin-top:8px">Cargando…</div>
    </div>
  </div>

</div>

<div id="notif" class="notif"></div>

<script>
const SB="https://rzcfrjgwxhgwslwvtbbe.supabase.co";
const SK="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ6Y2Zyamd3eGhnd3Nsd3Z0YmJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MzA2NjIsImV4cCI6MjA4ODMwNjY2Mn0.hWg2jS8q_X6xIbfMIYGU7Bp7JcJhpYbQwJEB4ZaSjrs";
let U=null, todos=[], tab="todos";

async function get(p){
  const r=await fetch(SB+"/rest/v1/"+p,{headers:{apikey:SK,Authorization:"Bearer "+SK}});
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}

window.onload=async()=>{
  U=getSession();
  if(!U){window.location.href="index.html";return;}
  if((U.rol||"").toUpperCase()!=="SUPERVISOR"){window.location.href="index.html";return;}
  const hoy=isoHoy();
  const d=new Date(hoy+"T12:00:00"); d.setDate(d.getDate()-30);
  document.getElementById("f-desde").value=`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  document.getElementById("f-hasta").value=hoy;
  await cargar();
};

async function cargar(){
  const desde=document.getElementById("f-desde").value;
  const hasta=document.getElementById("f-hasta").value;
  document.getElementById("cont").innerHTML='<div class="estado-empty"><div class="spin"></div><div class="e-txt" style="margin-top:8px">Cargando…</div></div>';
  document.getElementById("cnt").textContent="";
  try{
    let p=["select=*,requisicion_lineas(*)","codigo_solicitante=eq."+encodeURIComponent(String(U.codigo)),"order=created_at.desc"];
    if(desde)p.push("fecha_requisicion=gte."+desde);
    if(hasta)p.push("fecha_requisicion=lte."+hasta);
    todos=await get("requisiciones?"+p.join("&"))||[];
    render();
  }catch(e){
    document.getElementById("cont").innerHTML=`<div class="estado-empty"><div class="e-ico">❌</div><div class="e-txt">${e.message}</div></div>`;
  }
}

function setTab(t){
  tab=t;
  document.querySelectorAll(".tab").forEach(b=>b.classList.toggle("active",b.dataset.t===t));
  render();
}

function bEst(r){
  const ep=r.estado_planner, est=r.estado||"Pendiente";
  // Estado final: Planner confirmó → Pendiente de Compras
  if(ep==="Confirmado")     return'<span class="badge b-compras">🛒 Pend. de Compras</span>';
  // Aprobado por jefe → Pendiente de Grabación (el Planner aún no confirma)
  if(est==="Aprobado")      return'<span class="badge b-grab">📋 Pend. de Grabación</span>';
  // Rechazado
  if(est==="Rechazado")     return'<span class="badge b-rech">❌ Rechazado</span>';
  // Default: recién creado, esperando aprobación del jefe
  return'<span class="badge b-pend">⏳ Pend. de Autorización</span>';
}

function bCrit(c){
  const n=parseInt(c)||1;
  return`<span class="badge b-c${n}">${c}</span>`;
}

function render(){
  let fil=todos;
  if(tab==="Pendiente")  fil=todos.filter(r=>r.estado==="Pendiente"||!r.estado);
  else if(tab==="Aprobado")  fil=todos.filter(r=>r.estado==="Aprobado"&&r.estado_planner!=="Confirmado");
  else if(tab==="Confirmado") fil=todos.filter(r=>r.estado_planner==="Confirmado");
  else if(tab==="Rechazado") fil=todos.filter(r=>r.estado==="Rechazado");

  document.getElementById("cnt").textContent=`${fil.length} solicitud${fil.length!==1?"es":""}`;

  if(!fil.length){
    document.getElementById("cont").innerHTML='<div class="estado-empty"><div class="e-ico">📋</div><div class="e-txt">Sin requerimientos</div><div class="e-sub">No hay solicitudes en este filtro</div></div>';
    return;
  }

  document.getElementById("cont").innerHTML=fil.map(r=>{
    const ls=r.requisicion_lineas||[];

    const lineasHtml=ls.map((l,i)=>{
      // Cantidad ajustada del jefe — viene de cada línea (campo cantidad_jefe en requisicion_lineas)
      const cantAjustada=l.cantidad_jefe
        ?`<div class="cant-jefe-lin">✏️ Cant. ajustada por jefe: <strong>${l.cantidad_jefe} ${l.um||""}</strong></div>`
        :"";
      return`
      <div class="lin-row">
        <div class="lin-qty-wrap">
          <span class="lin-qty">${l.cantidad}</span>
          <span class="lin-um">${l.um||""}</span>
        </div>
        <div class="lin-body">
          <div class="lin-desc">${l.descripcion||"—"}</div>
          ${l.utilizacion?`<div class="lin-uso">${l.utilizacion}</div>`:""}
          ${cantAjustada}
        </div>
      </div>`;
    }).join("");

    // Nota del jefe — una sola para todo el requerimiento, al final del card
    const footer=r.notas_jefe
      ?`<div style="padding:12px 20px;border-top:1.5px solid var(--borde);background:#fafbff">
          <div class="nota-jefe-lin">💬 <span><strong>Nota del jefe:</strong> ${r.notas_jefe}</span></div>
        </div>`
      :"";

    return`
      <div class="req-card">
        <div class="req-hdr">
          <div class="req-hdr-left">
            <div class="req-id">REQ-${String(r.id).padStart(5,"0")}</div>
            <div class="req-fecha">📅 ${r.fecha_requisicion}</div>
          </div>
          <div class="badges">${bCrit(r.criticidad)} ${bEst(r)}</div>
        </div>
        <div class="lineas-wrap">${lineasHtml}</div>
        ${footer}
      </div>`;
  }).join("");
}

let nTO;
function notify(msg,type="info"){
  const el=document.getElementById("notif");
  el.textContent=msg; el.className="notif "+type;
  void el.offsetWidth; el.classList.add("show");
  clearTimeout(nTO); nTO=setTimeout(()=>el.classList.remove("show"),5000);
}
</script>
</body>
</html>
