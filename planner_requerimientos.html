<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MANODEOBRA – Planner Requerimientos</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="config.js"></script>
<style>
:root{--pur:#553c9a;--pur-d:#1a1035;--pur-bg:rgba(85,60,154,0.07);--borde:#e2e8f0;--bord2:#bac8e2;--rojo:#e53e3e;--verde:#2e9e4f;--nrj:#c05621;--fondo:#f0f4fb;--shadow:0 2px 16px rgba(85,60,154,0.10)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"DM Sans",sans-serif;background:var(--fondo);min-height:100vh}
.topbar{background:var(--pur);color:white;display:flex;align-items:center;padding:0 20px;height:58px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(85,60,154,0.35);gap:12px}
.tb-logo{font-family:"Space Mono",monospace;font-weight:700;font-size:13px;letter-spacing:2px;color:white;flex:1}
.btn-back{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.22);color:white;padding:7px 12px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600}
.btn-back:hover{background:rgba(255,255,255,0.22)}
.tb-user{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.22);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600;color:rgba(255,255,255,.9)}
.page{max-width:900px;margin:0 auto;padding:20px 16px;display:flex;flex-direction:column;gap:16px}
.page-title{font-family:"Space Mono",monospace;font-size:17px;font-weight:700;color:var(--pur-d)}
.filtros{background:white;border:1.5px solid var(--borde);border-radius:12px;padding:14px 16px;display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;box-shadow:var(--shadow)}
.f-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#718096;display:block;margin-bottom:4px}
.f-inp,.f-sel{padding:8px 12px;border:1.5px solid var(--borde);border-radius:8px;font-family:"DM Sans",sans-serif;font-size:13px;color:#222;outline:none;background:white;-webkit-appearance:none}
.f-inp:focus,.f-sel:focus{border-color:var(--pur)}
.btn-buscar{padding:9px 20px;background:var(--pur);color:white;border:none;border-radius:8px;font-family:"DM Sans",sans-serif;font-size:13px;font-weight:700;cursor:pointer;align-self:flex-end}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.kpi{background:white;border:1.5px solid var(--borde);border-radius:12px;padding:14px 16px;box-shadow:var(--shadow)}
.kpi-val{font-family:"Space Mono",monospace;font-size:22px;font-weight:700}
.kpi-lbl{font-size:10px;color:#718096;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-top:3px}
.kpi.a .kpi-val{color:var(--pur)}.kpi.p .kpi-val{color:#3860b2}.kpi.v .kpi-val{color:var(--verde)}.kpi.r .kpi-val{color:var(--rojo)}
.req-card{background:white;border:1.5px solid var(--borde);border-radius:14px;overflow:hidden;box-shadow:var(--shadow)}
.req-hdr{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;border-bottom:1.5px solid var(--borde);background:#f8fafc}
.req-id{font-family:"Space Mono",monospace;font-size:12px;font-weight:700;color:var(--pur-d)}
.req-meta{font-size:12px;color:#718096;margin-top:2px}
.badge{display:inline-flex;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.5px;font-family:"Space Mono",monospace}
.b-pend{background:#EDE9FE;color:#5521B5;border:1px solid #C4B5FD}
.b-seg{background:#DBEAFE;color:#1E40AF;border:1px solid #93C5FD}
.b-conf{background:#D1FAE5;color:#065F46;border:1px solid #6EE7B7}
.b-canc{background:#F3F4F6;color:#374151;border:1px solid #D1D5DB}
.b-c1{background:#F3F4F6;color:#374151;border:1px solid #D1D5DB}
.b-c2{background:#FEF3C7;color:#B45309;border:1px solid #FDE68A}
.b-c3{background:#FEE2E2;color:#9B1C1C;border:1px solid #FCA5A5}
.b-c4{background:#7F1D1D;color:white;border:1px solid #991B1B}
.req-body{padding:14px 16px}
.lin-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--borde);gap:8px;font-size:13px;align-items:flex-start}
.lin-row:last-child{border-bottom:none}
.lin-desc{font-weight:600;flex:1}
.lin-cod{font-family:"Space Mono",monospace;font-size:10px;color:#aaa;margin-top:2px}
.lin-uso{font-size:11px;color:#718096;margin-top:2px;font-style:italic}
.lin-qty{font-family:"Space Mono",monospace;font-size:12px;color:#718096;white-space:nowrap}
.nota-jefe{margin:10px 0 0;padding:8px 12px;background:#FFFBEB;border:1.5px solid #FDE68A;border-radius:8px;font-size:12px;color:#92400E}
.gest-panel{margin-top:14px;padding:14px;background:#F5F3FF;border:1.5px solid #C4B5FD;border-radius:10px}
.gest-ttl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#5521B5;margin-bottom:10px;font-family:"Space Mono",monospace}
.gest-btns{display:flex;gap:8px;flex-wrap:wrap}
.btn-seg{background:#DBEAFE;color:#1E40AF;border:1.5px solid #93C5FD;border-radius:8px;padding:9px 16px;font-family:"DM Sans",sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s}
.btn-seg:hover{background:#BFDBFE}
.btn-conf{background:#D1FAE5;color:#065F46;border:1.5px solid #6EE7B7;border-radius:8px;padding:9px 16px;font-family:"DM Sans",sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s}
.btn-conf:hover{background:#A7F3D0}
.btn-canc{background:#F3F4F6;color:#374151;border:1.5px solid #D1D5DB;border-radius:8px;padding:9px 16px;font-family:"DM Sans",sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s}
.btn-canc:hover{background:#E5E7EB}
.btn-gest:disabled{opacity:.45;cursor:default}
.estado-empty{padding:48px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px}
.e-ico{font-size:44px;opacity:.35}.e-txt{font-family:"Space Mono",monospace;font-size:13px;color:#718096}
.spin{display:inline-block;width:16px;height:16px;border:2.5px solid rgba(85,60,154,.25);border-top-color:var(--pur);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.notif{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#2d3748;color:white;padding:12px 22px;border-radius:12px;font-size:13px;font-weight:600;z-index:9999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);max-width:90vw;text-align:center}
.notif.show{transform:translateX(-50%) translateY(0)}.notif.error{background:var(--rojo)}.notif.success{background:var(--verde)}.notif.warning{background:var(--nrj)}
@media(max-width:600px){.kpi-row{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="topbar">
  <button class="btn-back" onclick="window.location.href='menu_planner.html'">← Menú</button>
  <div class="tb-logo">PLANNER — REQUERIMIENTOS</div>
  <div class="tb-user" id="tb-user">—</div>
</div>
<div class="page">
  <div><div class="page-title">Bandeja de Requerimientos Aprobados</div></div>
  <div class="filtros">
    <div><label class="f-lbl">Desde</label><input type="date" class="f-inp" id="f-desde" style="width:138px"></div>
    <div><label class="f-lbl">Hasta</label><input type="date" class="f-inp" id="f-hasta" style="width:138px"></div>
    <div><label class="f-lbl">Estado Planner</label>
      <select class="f-sel" id="f-ep" style="width:160px">
        <option value="">Todos</option>
        <option value="null" selected>Sin gestionar</option>
        <option value="En Seguimiento">En Seguimiento</option>
        <option value="Confirmado">Confirmado</option>
        <option value="Cancelado">Cancelado</option>
      </select>
    </div>
    <div><label class="f-lbl">Criticidad</label>
      <select class="f-sel" id="f-cr" style="width:150px">
        <option value="">Todas</option>
        <option value="4-Muy Critico">4 – Muy Crítico</option>
        <option value="3-Critico">3 – Crítico</option>
        <option value="2-Poco Critico">2 – Poco Crítico</option>
        <option value="1-No Critico">1 – No Crítico</option>
      </select>
    </div>
    <button class="btn-buscar" onclick="cargar()">🔍 Buscar</button>
  </div>
  <div class="kpi-row" id="kpis" style="display:none">
    <div class="kpi a"><div class="kpi-val" id="k-tot">0</div><div class="kpi-lbl">Total</div></div>
    <div class="kpi p"><div class="kpi-val" id="k-pen">0</div><div class="kpi-lbl">Sin gestionar</div></div>
    <div class="kpi v"><div class="kpi-val" id="k-con">0</div><div class="kpi-lbl">✓ Confirmados</div></div>
    <div class="kpi r"><div class="kpi-val" id="k-can">0</div><div class="kpi-lbl">✕ Cancelados</div></div>
  </div>
  <div id="cont"><div class="estado-empty"><div class="e-ico">🔍</div><div class="e-txt">Presiona Buscar para cargar</div></div></div>
</div>
<div id="notif" class="notif"></div>
<script>
const SB="/api/supa";
const SK="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ6Y2Zyamd3eGhnd3Nsd3Z0YmJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MzA2NjIsImV4cCI6MjA4ODMwNjY2Mn0.hWg2jS8q_X6xIbfMIYGU7Bp7JcJhpYbQwJEB4ZaSjrs";
let U=null,todos=[];
const hdr={apikey:SK,Authorization:"Bearer "+SK};
async function get(p){const r=await fetch(SB+"/rest/v1/"+p,{headers:hdr});if(!r.ok)throw new Error(await r.text());return r.json();}
async function patch(id,b){const r=await fetch(SB+"/rest/v1/requisiciones?id=eq."+id,{method:"PATCH",headers:{...hdr,"Content-Type":"application/json",Prefer:"return=minimal"},body:JSON.stringify(b)});if(!r.ok)throw new Error(await r.text());}
window.onload=async()=>{
  U=getSession();if(!U){window.location.href="index.html";return;}
  if((U.rol||"").toUpperCase()!=="PLANNER"){window.location.href="index.html";return;}
  document.getElementById("tb-user").textContent=U.nombre;
  const hoy=isoHoy(),d30=new Date(hoy+"T12:00:00");d30.setDate(d30.getDate()-30);
  document.getElementById("f-desde").value=d30.toISOString().slice(0,10);
  document.getElementById("f-hasta").value=hoy;
  await cargar();
};
async function cargar(){
  const desde=document.getElementById("f-desde").value,hasta=document.getElementById("f-hasta").value;
  const ep=document.getElementById("f-ep").value,cr=document.getElementById("f-cr").value;
  document.getElementById("cont").innerHTML='<div class="estado-empty"><div class="spin"></div><div class="e-txt" style="margin-top:8px">Cargando…</div></div>';
  document.getElementById("kpis").style.display="none";
  try{
    let p=["select=*,requisicion_lineas(*)","estado=eq.Aprobado","order=created_at.desc"];
    if(desde)p.push("fecha_requisicion=gte."+desde);if(hasta)p.push("fecha_requisicion=lte."+hasta);
    if(ep==="null")p.push("estado_planner=is.null");else if(ep)p.push("estado_planner=eq."+encodeURIComponent(ep));
    if(cr)p.push("criticidad=eq."+encodeURIComponent(cr));
    todos=await get("requisiciones?"+p.join("&"))||[];
    document.getElementById("k-tot").textContent=todos.length;
    document.getElementById("k-pen").textContent=todos.filter(r=>!r.estado_planner).length;
    document.getElementById("k-con").textContent=todos.filter(r=>r.estado_planner==="Confirmado").length;
    document.getElementById("k-can").textContent=todos.filter(r=>r.estado_planner==="Cancelado").length;
    document.getElementById("kpis").style.display="grid";
    render();
  }catch(e){document.getElementById("cont").innerHTML=`<div class="estado-empty"><div class="e-ico">❌</div><div class="e-txt">${e.message}</div></div>`;}
}
function bCrit(c){const n=parseInt(c)||1;return`<span class="badge b-c${n}">${c}</span>`;}
function bEP(ep){
  if(!ep)return'<span class="badge b-pend">📋 Sin gestionar</span>';
  if(ep==="En Seguimiento")return'<span class="badge b-seg">● En Seguimiento</span>';
  if(ep==="Confirmado")return'<span class="badge b-conf">✓ Confirmado</span>';
  if(ep==="Cancelado")return'<span class="badge b-canc">✕ Cancelado</span>';
  return'<span class="badge">'+ep+'</span>';
}
function render(){
  if(!todos.length){document.getElementById("cont").innerHTML='<div class="estado-empty"><div class="e-ico">📭</div><div class="e-txt">Sin requerimientos en este filtro</div></div>';return;}
  document.getElementById("cont").innerHTML=todos.map(r=>{
    const ls=r.requisicion_lineas||[];
    const lh=ls.map(l=>`<div class="lin-row"><div><div class="lin-desc">${l.descripcion||"—"}</div><div class="lin-cod">${l.articulosap||""}</div><div class="lin-uso">${l.utilizacion||""}</div></div><div class="lin-qty">${r.cantidad_jefe||l.cantidad} ${l.um||""}</div></div>`).join("");
    const nj=r.notas_jefe?`<div class="nota-jefe">💬 Jefe: ${r.notas_jefe}</div>`:"";
    const ep=r.estado_planner;
    const dis=s=>ep===s?"disabled":"";
    const gp=`<div class="gest-panel"><div class="gest-ttl">Gestión Planner${ep?` — Estado actual: ${ep}`:""}</div><div class="gest-btns">
      <button class="btn-gest btn-seg" ${dis("En Seguimiento")} onclick="cambiar(${r.id},'En Seguimiento')">● En Seguimiento</button>
      <button class="btn-gest btn-conf" ${dis("Confirmado")} onclick="cambiar(${r.id},'Confirmado')">✓ Confirmar</button>
      <button class="btn-gest btn-canc" ${dis("Cancelado")} onclick="cambiar(${r.id},'Cancelado')">✕ Cancelar</button>
    </div></div>`;
    return`<div class="req-card" id="rc-${r.id}"><div class="req-hdr"><div><div class="req-id">REQ-${String(r.id).padStart(5,"0")}</div><div class="req-meta">${r.fecha_requisicion} · ${r.nombre_solicitante} · Jefe: ${r.jefe_nombre||"—"}</div></div><div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">${bCrit(r.criticidad)} ${bEP(ep)}</div></div><div class="req-body">${lh}${nj}${gp}</div></div>`;
  }).join("");
}
async function cambiar(id,nuevoEst){
  document.querySelectorAll(`#rc-${id} .btn-gest`).forEach(b=>b.disabled=true);
  try{
    const pay={estado_planner:nuevoEst};
    if(nuevoEst==="Confirmado")pay.fecha_confirmacion=new Date().toISOString();
    await patch(id,pay);
    const r=todos.find(x=>x.id===id);if(r){r.estado_planner=nuevoEst;if(nuevoEst==="Confirmado")r.fecha_confirmacion=new Date().toISOString();}
    notify(`REQ-${String(id).padStart(5,"0")} → ${nuevoEst} ✅`,"success");
    render();
    document.getElementById("k-pen").textContent=todos.filter(r=>!r.estado_planner).length;
    document.getElementById("k-con").textContent=todos.filter(r=>r.estado_planner==="Confirmado").length;
    document.getElementById("k-can").textContent=todos.filter(r=>r.estado_planner==="Cancelado").length;
  }catch(e){notify("Error: "+e.message,"error");document.querySelectorAll(`#rc-${id} .btn-gest`).forEach(b=>b.disabled=false);}
}
let nTO;function notify(msg,type="info"){const el=document.getElementById("notif");el.textContent=msg;el.className="notif "+type;void el.offsetWidth;el.classList.add("show");clearTimeout(nTO);nTO=setTimeout(()=>el.classList.remove("show"),5000);}
</script>
</body>
</html>
