<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MANODEOBRA – Supervisor</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="config.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:var(--azul);min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:32px;padding:32px 20px}
  :root{--azul:#3860b2;--azul-oscuro:#00126b;--verde:#2e9e4f}
  .sup-badge{background:rgba(255,255,255,0.18);border:1.5px solid rgba(255,255,255,0.35);border-radius:8px;padding:6px 14px;color:rgba(255,255,255,0.85);font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;display:inline-block}
  .sup-title{font-family:'Space Mono',monospace;color:white;font-size:22px;font-weight:700;letter-spacing:2px;margin:16px 0 6px;text-align:center}
  .sup-name{color:rgba(255,255,255,0.75);font-size:14px;text-align:center}
  .sup-menu{display:flex;flex-direction:column;gap:16px;width:100%;max-width:360px}
  .sup-btn{display:flex;align-items:center;gap:18px;background:rgba(255,255,255,0.12);border:2px solid rgba(255,255,255,0.25);border-radius:18px;padding:22px 24px;cursor:pointer;transition:all 0.2s;text-align:left;width:100%;color:white;font-family:'DM Sans',sans-serif;text-decoration:none}
  .sup-btn:hover{background:rgba(255,255,255,0.22);border-color:rgba(255,255,255,0.5);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.2)}
  .sup-btn-icon{font-size:38px;flex-shrink:0}
  .sup-btn-label{font-size:18px;font-weight:700;display:block}
  .sup-btn-desc{font-size:12px;color:rgba(255,255,255,0.65);display:block;margin-top:3px}
  .sup-logout{background:none;border:none;color:rgba(255,255,255,0.55);font-size:13px;cursor:pointer;padding:8px 16px;border-radius:8px;font-family:'DM Sans',sans-serif}
  .sup-logout:hover{color:white;background:rgba(255,0,0,0.2)}
</style>
</head>
<body>
<div style="text-align:center">
  <div class="sup-badge">👔 Supervisor</div>
  <div class="sup-title">MANODEOBRA</div>
  <div class="sup-name" id="sup-nombre">—</div>
</div>

<div class="sup-menu">
  <a class="sup-btn" href="grabar.html">
    <div class="sup-btn-icon">📝</div>
    <div>
      <span class="sup-btn-label">Grabar</span>
      <span class="sup-btn-desc">Registrar actividades de mano de obra</span>
    </div>
  </a>
  <a class="sup-btn" href="autorizar.html">
    <div class="sup-btn-icon">🔍</div>
    <div>
      <span class="sup-btn-label">Autorizar</span>
      <span class="sup-btn-desc">Revisar y validar registros grabados</span>
    </div>
  </a>
</div>

<button class="sup-logout" onclick="cerrarSesion()">🚪 Cerrar sesión</button>

<script>
window.onload = () => {
  const user = getSession();
  if (!user) { window.location.href = 'index.html'; return; }
  if ((user.rol||'').toUpperCase() !== 'SUPERVISOR') { window.location.href = 'grabar.html'; return; }
  document.getElementById('sup-nombre').textContent = user.nombre;
};
function cerrarSesion() { clearSession(); window.location.href = 'index.html'; }
</script>
</body>
</html>
