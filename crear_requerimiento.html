<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MANODEOBRA – Nuevo Requerimiento</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="config.js"><\/script>
<style>
:root{--azul:#3860b2;--azul-d:#00126b;--azul-bg:rgba(56,96,178,0.07);--borde:#e2e8f0;--bord2:#bac8e2;--gris:#4d4d4d;--rojo:#e53e3e;--verde:#2e9e4f;--nrj:#c05621;--fondo:#f0f4fb;--shadow:0 2px 16px rgba(56,96,178,0.10)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"DM Sans",sans-serif;background:var(--fondo);min-height:100vh}
.topbar{background:var(--azul-d);color:white;display:flex;align-items:center;padding:0 16px;height:58px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,18,107,0.22);gap:12px}
.tb-logo{font-family:"Space Mono",monospace;font-weight:700;font-size:13px;letter-spacing:2px;color:white;flex:1}
.btn-back{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.22);color:white;padding:7px 12px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600}
.btn-back:hover{background:rgba(255,255,255,0.22)}
.tb-user{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.22);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600;color:rgba(255,255,255,.9);white-space:nowrap;max-width:200px;overflow:hidden;text-overflow:ellipsis}
.content{max-width:680px;margin:0 auto;padding:20px 16px;display:flex;flex-direction:column;gap:16px}
.card{background:white;border:1.5px solid var(--borde);border-radius:16px;overflow:hidden;box-shadow:var(--shadow)}
.card-hdr{padding:12px 18px;background:#f8fafc;border-bottom:1.5px solid var(--borde);font-family:"Space Mono",monospace;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--azul);display:flex;align-items:center;gap:8px}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.card-body{padding:18px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:13px}
.field:last-child{margin-bottom:0}
label.fl{font-size:12px;font-weight:600;color:var(--gris)}
input.fi,select.fi,textarea.fi{width:100%;padding:10px 13px;border:1.5px solid var(--borde);border-radius:8px;font-family:"DM Sans",sans-serif;font-size:14px;color:#222;background:white;outline:none;transition:border-color .2s;-webkit-appearance:none}
input.fi:focus,select.fi:focus,textarea.fi:focus{border-color:var(--azul);box-shadow:0 0 0 3px rgba(56,96,178,.1)}
textarea.fi{resize:vertical;min-height:74px}
.fi.readonly{background:#f0f4fb;color:var(--azul-d);font-weight:700;cursor:default;border-color:var(--bord2)}
.fi.error{border-color:var(--rojo)!important;background:#fff5f5!important}
.ss-wrap{position:relative}
.ss-input{width:100%;padding:10px 13px;border:1.5px solid var(--borde);border-radius:8px;font-family:"DM Sans",sans-serif;font-size:14px;color:#222;outline:none;transition:border-color .2s;background:white}
.ss-input:focus{border-color:var(--azul);box-shadow:0 0 0 3px rgba(56,96,178,.1)}
.ss-input.error{border-color:var(--rojo)!important;background:#fff5f5!important}
.ss-drop{position:absolute;top:calc(100% + 3px);left:0;right:0;background:white;border:1.5px solid var(--bord2);border-radius:10px;max-height:220px;overflow-y:auto;z-index:500;display:none;box-shadow:0 8px 28px rgba(0,0,0,.14)}
.ss-drop.open{display:block}
.ss-opt{padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--borde)}
.ss-opt:last-child{border-bottom:none}
.ss-opt:hover{background:var(--azul-bg)}
.ss-opt-desc{font-size:13px;font-weight:600;color:#1a202c}
.ss-opt-cod{font-family:"Space Mono",monospace;font-size:10px;color:#aaa;margin-top:2px}
.ss-empty{padding:10px 14px;font-size:13px;color:#aaa;font-style:italic}
.linea{background:#f8fafc;border:1.5px solid var(--borde);border-radius:12px;padding:14px;margin-bottom:10px}
.linea:last-child{margin-bottom:0}
.linea-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.linea-num{font-family:"Space Mono",monospace;font-size:11px;font-weight:700;color:var(--azul);background:var(--azul-bg);border:1px solid var(--bord2);border-radius:12px;padding:3px 10px}
.btn-rm{background:#fee2e2;color:#9b1c1c;border:none;border-radius:6px;padding:5px 11px;font-size:11px;font-weight:700;cursor:pointer}
.btn-rm:hover{background:#fecaca}
.qty-um-row{display:grid;grid-template-columns:1fr 90px;gap:10px}
.btn-add-linea{width:100%;padding:13px;background:var(--azul-bg);border:2px dashed var(--bord2);border-radius:10px;font-family:"DM Sans",sans-serif;font-size:13px;font-weight:600;color:var(--azul);cursor:pointer;transition:all .2s;margin-top:4px}
.btn-add-linea:hover{background:rgba(56,96,178,.14);border-color:var(--azul)}
.btn-add-linea:disabled{opacity:.5;cursor:not-allowed}
.btn-enviar{width:100%;padding:15px;background:var(--verde);color:white;border:none;border-radius:13px;font-family:"DM Sans",sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:10px}
.btn-enviar:hover{background:#276040;transform:translateY(-1px)}
.btn-enviar:disabled{opacity:.5;cursor:not-allowed;transform:none}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:600;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal-box{background:white;border-radius:18px;padding:24px;max-width:480px;width:100%;box-shadow:0 24px 64px rgba(0,0,0,.28);max-height:80vh;overflow-y:auto}
.modal-title{font-family:"Space Mono",monospace;font-size:12px;font-weight:700;color:var(--azul-d);margin-bottom:16px;letter-spacing:1px}
.modal-linea{padding:9px 0;border-bottom:1px solid var(--borde);font-size:13px}
.modal-linea:last-child{border-bottom:none}
.modal-linea strong{color:#1a202c;display:block}
.modal-linea span{font-size:11px;color:#718096;display:block;margin-top:2px}
.modal-btns{display:flex;gap:10px;margin-top:18px}
.btn-mc{flex:1;padding:11px;background:#f8fafc;border:1.5px solid var(--borde);border-radius:9px;font-family:"DM Sans",sans-serif;font-size:13px;font-weight:600;cursor:pointer;color:var(--gris)}
.btn-mc:hover{background:#f0f0f0}
.btn-mok{flex:2;padding:11px;background:var(--verde);color:white;border:none;border-radius:9px;font-family:"DM Sans",sans-serif;font-size:13px;font-weight:700;cursor:pointer}
.btn-mok:hover{background:#276040}
#ov-save{display:none;position:fixed;inset:0;background:rgba(56,96,178,.2);backdrop-filter:blur(4px);z-index:800;align-items:center;justify-content:center;flex-direction:column;gap:16px}
#ov-save.show{display:flex}
.spinner{width:50px;height:50px;border:4px solid rgba(255,255,255,.35);border-top-color:white;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.save-txt{color:white;font-weight:700;font-size:16px}
#ov-ok{display:none;position:fixed;inset:0;background:var(--fondo);z-index:700;flex-direction:column;align-items:center;justify-content:center;gap:14px}
#ov-ok.show{display:flex}
.ok-ico{font-size:80px}.ok-tit{color:var(--verde);font-size:24px;font-weight:700;font-family:"Space Mono",monospace}.ok-sub{color:var(--gris);font-size:14px;text-align:center;padding:0 24px}
.notif{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#2d3748;color:white;padding:13px 24px;border-radius:12px;font-size:13px;font-weight:600;z-index:9999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);max-width:90vw;text-align:center;box-shadow:0 8px 28px rgba(0,0,0,.22)}
.notif.show{transform:translateX(-50%) translateY(0)}.notif.error{background:var(--rojo)}.notif.success{background:var(--verde)}.notif.warning{background:var(--nrj)}
@media(max-width:480px){.form-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="ov-save"><div class="spinner"></div><div class="save-txt">Enviando requerimiento…</div></div>
<div id="ov-ok">
  <div class="ok-ico">✅</div>
  <div class="ok-tit">¡Enviado!</div>
  <div class="ok-sub" id="ok-sub">Tu requerimiento fue enviado al jefe para aprobación</div>
  <div style="font-size:12px;color:#aaa;margin-top:4px">Regresando al menú…</div>
</div>
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-title">📋 CONFIRMAR REQUERIMIENTO</div>
    <div id="modal-body"></div>
    <div class="modal-btns">
      <button class="btn-mc" onclick="cerrarModal()">✕ Revisar</button>
      <button class="btn-mok" onclick="ejecutar()">✓ Confirmar y Enviar</button>
    </div>
  </div>
</div>
<div class="topbar">
  <button class="btn-back" onclick="window.location.href='menu_supervisor.html'">← Menú</button>
  <div class="tb-logo">NUEVO REQUERIMIENTO</div>
  <div class="tb-user" id="tb-user">—</div>
</div>
<div class="content">
  <div class="card">
    <div class="card-hdr"><span class="dot" style="background:var(--azul)"></span> Datos Generales</div>
    <div class="card-body">
      <div class="form-row">
        <div class="field">
          <label class="fl">Fecha de Requerimiento</label>
          <input class="fi readonly" id="f-fecha" type="text" readonly>
        </div>
        <div class="field">
          <label class="fl">Criticidad *</label>
          <select class="fi" id="f-crit">
            <option value="1-No Critico">1 – No Crítico</option>
            <option value="2-Poco Critico">2 – Poco Crítico</option>
            <option value="3-Critico">3 – Crítico</option>
            <option value="4-Muy Critico">4 – Muy Crítico</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label class="fl">Solicitante</label>
        <input class="fi readonly" id="f-solic" type="text" readonly>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="card-hdr"><span class="dot" style="background:var(--nrj)"></span> Artículos Solicitados</div>
    <div class="card-body">
      <div id="lineas-wrap"></div>
      <button class="btn-add-linea" id="btn-add" onclick="addLinea()">＋ Agregar Artículo</button>
    </div>
  </div>
  <button class="btn-enviar" id="btn-enviar" onclick="guardar()">💾 Enviar Requerimiento</button>
</div>
<div id="notif" class="notif"></div>
<script>
const SB="https://rzcfrjgwxhgwslwvtbbe.supabase.co";
const SK="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ6Y2Zyamd3eGhnd3Nsd3Z0YmJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MzA2NjIsImV4cCI6MjA4ODMwNjY2Mn0.hWg2jS8q_X6xIbfMIYGU7Bp7JcJhpYbQwJEB4ZaSjrs";
let U=null,arts=[],seq=0,lids=[],filas=[];
const hdr={apikey:SK,Authorization:"Bearer "+SK};
async function get(p){const r=await fetch(SB+"/rest/v1/"+p,{headers:hdr});if(!r.ok)throw new Error(await r.text());return r.json();}
async function post(t,b,pref="return=minimal"){const r=await fetch(SB+"/rest/v1/"+t,{method:"POST",headers:{...hdr,"Content-Type":"application/json",Prefer:pref},body:JSON.stringify(b)});if(!r.ok)throw new Error(await r.text());return pref.includes("representation")?r.json():null;}
window.onload=async()=>{
  U=getSession();
  if(!U){window.location.href="index.html";return;}
  if((U.rol||"").toUpperCase()!=="SUPERVISOR"){window.location.href="index.html";return;}
  document.getElementById("tb-user").textContent="👔 "+U.nombre;
  document.getElementById("f-fecha").value=isoHoy();
  document.getElementById("f-solic").value=U.codigo+" — "+U.nombre;
  const btn=document.getElementById("btn-add");
  btn.disabled=true;btn.textContent="⏳ Cargando artículos…";
  try{
    const L=1000;let off=0,res=[],pg=[];
    do{pg=await get("Articulos_SAP?select=ArticuloSAP,ArticuloHana,Descripcion,UM&order=Descripcion.asc&limit="+L+"&offset="+off);
      if(pg&&pg.length)res=res.concat(pg);off+=L;
    }while(pg&&pg.length===L);
    arts=res;
  }catch(e){notify("No se cargaron artículos","warning");}
  btn.disabled=false;btn.textContent="＋ Agregar Artículo";
  addLinea();
};
function addLinea(){
  const lid=++seq;lids.push(lid);
  const w=document.getElementById("lineas-wrap");
  const d=document.createElement("div");d.className="linea";d.id="l"+lid;
  d.innerHTML=`<div class="linea-hdr"><span class="linea-num">Artículo #${lids.length}</span>${lids.length>1?`<button class="btn-rm" onclick="rmLinea(${lid})">✕ Quitar</button>`:""}</div>
    <div class="field"><label class="fl">Artículo (código SAP, HANA o descripción) *</label>
      <div class="ss-wrap">
        <input class="ss-input" id="si${lid}" placeholder="Escribe para buscar…" oninput="filtrar(${lid})" onblur="cDrop(${lid})" autocomplete="off">
        <div class="ss-drop" id="sd${lid}" onmousedown="event.preventDefault()"></div>
        <input type="hidden" id="sc${lid}"><input type="hidden" id="sh${lid}"><input type="hidden" id="su${lid}">
      </div></div>
    <div class="qty-um-row">
      <div class="field"><label class="fl">Cantidad *</label><input class="fi" id="sq${lid}" type="number" min="0.01" step="0.01" value="1"></div>
      <div class="field"><label class="fl">UM</label><input class="fi readonly" id="sm${lid}" type="text" readonly placeholder="—"></div>
    </div>
    <div class="field"><label class="fl">Utilización *</label><textarea class="fi" id="su2${lid}" placeholder="Describe para qué se usará este artículo…"></textarea></div>`;
  w.appendChild(d);
  setTimeout(()=>document.getElementById("si"+lid)?.focus(),80);
}
function rmLinea(lid){
  if(lids.length<=1){notify("Debe quedar al menos un artículo","warning");return;}
  document.getElementById("l"+lid)?.remove();
  lids=lids.filter(x=>x!==lid);
  lids.forEach((l,i)=>{const e=document.querySelector("#l"+l+" .linea-num");if(e)e.textContent="Artículo #"+(i+1);});
}
function filtrar(lid){
  const q=(document.getElementById("si"+lid)?.value||"").toLowerCase().trim();
  const d=document.getElementById("sd"+lid);
  if(q.length<2){d.classList.remove("open");return;}
  const m=arts.filter(a=>(a.Descripcion||"").toLowerCase().includes(q)||(a.ArticuloSAP||"").includes(q)||(a.ArticuloHana||"").toLowerCase().includes(q)).slice(0,40);
  if(!m.length){d.innerHTML=`<div class="ss-empty">Sin resultados para "${q}"</div>`;d.classList.add("open");return;}
  d.innerHTML=m.map(a=>`<div class="ss-opt" onmousedown="sel(${lid},${JSON.stringify(a.ArticuloSAP)},${JSON.stringify(a.ArticuloHana||"")},${JSON.stringify(a.Descripcion)},${JSON.stringify(a.UM||"")})"><div class="ss-opt-desc">${a.Descripcion}</div><div class="ss-opt-cod">${a.ArticuloSAP}${a.ArticuloHana?" · HANA: "+a.ArticuloHana:""}</div></div>`).join("");
  d.classList.add("open");
}
function sel(lid,cod,hana,desc,um){
  document.getElementById("si"+lid).value=desc;
  document.getElementById("sc"+lid).value=cod;
  document.getElementById("sh"+lid).value=hana;
  document.getElementById("su"+lid).value=um;
  document.getElementById("sm"+lid).value=um||"—";
  document.getElementById("sd"+lid).classList.remove("open");
  document.getElementById("si"+lid).classList.remove("error");
}
function cDrop(lid){setTimeout(()=>document.getElementById("sd"+lid)?.classList.remove("open"),250);}
function cerrarModal(){document.getElementById("modal").classList.remove("show");}
async function guardar(){
  filas=[];let err=null;
  for(const lid of lids){
    const cod=(document.getElementById("sc"+lid)?.value||"").trim();
    const desc=(document.getElementById("si"+lid)?.value||"").trim();
    const hana=(document.getElementById("sh"+lid)?.value||"").trim()||null;
    const um=(document.getElementById("su"+lid)?.value||"").trim()||null;
    const qty=parseFloat(document.getElementById("sq"+lid)?.value||0);
    const uso=(document.getElementById("su2"+lid)?.value||"").trim();
    if(!cod||!desc){document.getElementById("si"+lid)?.classList.add("error");if(!err)err=document.getElementById("si"+lid);notify("Selecciona un artículo del catálogo en todas las líneas","error");break;}
    document.getElementById("si"+lid)?.classList.remove("error");
    if(qty<=0){document.getElementById("sq"+lid)?.classList.add("error");if(!err)err=document.getElementById("sq"+lid);notify("La cantidad debe ser mayor a 0","error");break;}
    document.getElementById("sq"+lid)?.classList.remove("error");
    if(!uso){document.getElementById("su2"+lid)?.classList.add("error");if(!err)err=document.getElementById("su2"+lid);notify("La utilización es obligatoria en todas las líneas","error");break;}
    document.getElementById("su2"+lid)?.classList.remove("error");
    filas.push({articulosap:cod,articulohana:hana,descripcion:desc,cantidad:qty,um,utilizacion:uso});
  }
  if(err){err.scrollIntoView({behavior:"smooth",block:"center"});return;}
  if(!filas.length){notify("Agrega al menos un artículo","warning");return;}
  const crit=document.getElementById("f-crit").value;
  let html=`<div style="margin-bottom:12px;padding:8px 12px;background:#f0f4fb;border-radius:8px;font-size:13px"><strong>Criticidad:</strong> ${crit}</div>`;
  filas.forEach((f,i)=>{html+=`<div class="modal-linea"><strong>${i+1}. ${f.descripcion}</strong><span>Cantidad: ${f.cantidad} ${f.um||""} · ${f.utilizacion}</span></div>`;});
  document.getElementById("modal-body").innerHTML=html;
  document.getElementById("modal").classList.add("show");
}
async function ejecutar(){
  cerrarModal();
  document.getElementById("btn-enviar").disabled=true;
  document.getElementById("ov-save").classList.add("show");
  try{
    const cab=await post("requisiciones",{fecha_requisicion:isoHoy(),codigo_solicitante:String(U.codigo),nombre_solicitante:U.nombre,criticidad:document.getElementById("f-crit").value,estado:"Pendiente"},"return=representation");
    const id=Array.isArray(cab)?cab[0]?.id:cab?.id;
    if(!id)throw new Error("No se obtuvo el ID");
    await post("requisicion_lineas",filas.map(f=>({...f,requisicion_id:id})));
    document.getElementById("ov-save").classList.remove("show");
    document.getElementById("ok-sub").textContent="REQ-"+String(id).padStart(5,"0")+" enviado al jefe para aprobación";
    document.getElementById("ov-ok").classList.add("show");
    setTimeout(()=>window.location.href="menu_supervisor.html",2800);
  }catch(e){
    document.getElementById("ov-save").classList.remove("show");
    document.getElementById("btn-enviar").disabled=false;
    notify("Error: "+e.message,"error");
  }
}
let nTO;
function notify(msg,type="info"){const el=document.getElementById("notif");el.textContent=msg;el.className="notif "+type;void el.offsetWidth;el.classList.add("show");clearTimeout(nTO);nTO=setTimeout(()=>el.classList.remove("show"),5000);}
<\/script>
</body>
</html>
