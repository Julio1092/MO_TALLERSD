<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MANODEOBRA – Aprobar Reservas</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="config.js"></script>
<style>
:root{--bg:#f0f4fb;--bg2:#fff;--bg3:#f8fafc;--border:#e2e8f0;--bord2:#bac8e2;--azul:#3860b2;--azul-d:#00126b;--azul-bg:rgba(56,96,178,0.07);--verde:#2e9e4f;--nrj:#c05621;--rojo:#c53030;--txt:#1a202c;--txt2:#2d3748;--txt3:#718096;--shadow:0 2px 12px rgba(56,96,178,0.10)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);min-height:100vh}
.topbar{position:sticky;top:0;z-index:200;background:var(--azul-d);display:flex;align-items:center;gap:12px;padding:0 24px;height:58px;box-shadow:0 2px 12px rgba(0,18,107,0.22)}
.tb-back{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.22);color:white;padding:7px 14px;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;transition:all .2s}
.tb-back:hover{background:rgba(255,255,255,0.22)}
.tb-logo{font-family:'Space Mono',monospace;font-weight:700;font-size:14px;letter-spacing:2px;color:white;flex:1}
.tb-user{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.22);border-radius:20px;padding:5px 14px;font-size:12px;font-weight:600;color:rgba(255,255,255,.9)}
.page{padding:24px;max-width:1100px;margin:0 auto;display:flex;flex-direction:column;gap:20px}
.page-title{font-family:'Space Mono',monospace;font-size:20px;font-weight:700;color:var(--azul-d)}
.page-sub{font-size:13px;color:var(--txt3);margin-top:3px}
.card{background:var(--bg2);border:1.5px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:var(--shadow)}
.card-hdr{padding:13px 20px;border-bottom:1.5px solid var(--border);background:var(--bg3);display:flex;align-items:center;justify-content:space-between}
.card-ttl{font-family:'Space Mono',monospace;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--azul);display:flex;align-items:center;gap:7px}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.f-grid{padding:18px 20px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.f-grp{display:flex;flex-direction:column;gap:5px}
.f-lbl{font-size:11px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.8px}
.f-inp{width:100%;padding:10px 13px;background:white;border:1.5px solid var(--border);border-radius:9px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--txt);outline:none;-webkit-appearance:none;appearance:none;transition:border-color .2s}
.f-inp:focus{border-color:var(--azul);box-shadow:0 0 0 3px rgba(56,96,178,.12)}
.f-btns{padding:0 20px 18px;display:flex;gap:10px}
.btn-b{flex:1;padding:11px;background:var(--azul);color:white;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-b:hover{background:var(--azul-d);transform:translateY(-1px)} .btn-b:disabled{opacity:.6;transform:none;cursor:wait}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.35);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.kpi{background:var(--bg2);border:1.5px solid var(--border);border-radius:14px;padding:18px 20px;box-shadow:var(--shadow);animation:fadeUp .4s ease both;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:4px}
.kpi.a::before{background:var(--azul)} .kpi.v::before{background:var(--verde)} .kpi.n::before{background:var(--nrj)}
.kpi-val{font-family:'Space Mono',monospace;font-size:32px;font-weight:700;letter-spacing:-1px}
.kpi.a .kpi-val{color:var(--azul)} .kpi.v .kpi-val{color:var(--verde)} .kpi.n .kpi-val{color:var(--nrj)}
.kpi-lbl{font-size:11px;color:var(--txt3);font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-top:4px}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.grupos{padding:16px 20px;display:flex;flex-direction:column;gap:16px}
.grupo{border:1.5px solid var(--border);border-radius:14px;overflow:hidden}
.grupo-hdr{background:var(--bg3);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;border-bottom:1.5px solid var(--border)}
.grupo-info{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.grupo-ot{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;color:var(--azul-d);background:var(--azul-bg);border:1px solid var(--bord2);border-radius:8px;padding:4px 12px}
.grupo-mec{font-size:13px;font-weight:600;color:var(--txt2)}
.grupo-meta{font-size:12px;color:var(--txt3)}
.badge{display:inline-flex;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;font-family:'Space Mono',monospace}
.btn-aprobar{background:var(--verde);color:white;border:none;border-radius:9px;padding:9px 18px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:7px;transition:all .2s;box-shadow:0 2px 8px rgba(46,158,79,.25);white-space:nowrap}
.btn-aprobar:hover{background:#276040;transform:translateY(-1px)} .btn-aprobar:disabled{opacity:.5;cursor:wait;transform:none}
.btn-aprobar.done{background:#e2f8ea;color:#276040;border:1.5px solid #9ae6b4;cursor:default;box-shadow:none}
.btn-rechazar-todo{background:#fff0f0;color:var(--rojo);border:1.5px solid #fca5a5;border-radius:9px;padding:9px 18px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:7px;transition:all .2s;white-space:nowrap}
.btn-rechazar-todo:hover{background:var(--rojo);color:white;border-color:var(--rojo);transform:translateY(-1px)}
.btn-rechazar-todo:disabled{opacity:.5;cursor:not-allowed;transform:none}
.lineas-tbl{width:100%;border-collapse:collapse}
.lineas-tbl th{padding:8px 12px;text-align:left;font-family:'Space Mono',monospace;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--txt3);background:var(--bg3);border-bottom:1.5px solid var(--border)}
.lineas-tbl td{padding:8px 12px;font-size:13px;color:var(--txt2);border-bottom:1px solid var(--border);vertical-align:middle}
.lineas-tbl tr:last-child td{border-bottom:none}
.td-cod{font-family:'Space Mono',monospace;font-size:11px;color:var(--txt3)}
.td-um{font-family:'Space Mono',monospace;font-size:11px;color:var(--txt3)}
.td-qty-orig{font-family:'Space Mono',monospace;font-weight:700;color:var(--txt3);font-size:12px;white-space:nowrap}
.qty-arrow{font-size:13px;color:#aaa}
.qty-edit{width:80px;padding:6px 8px;border:1.5px solid var(--bord2);border-radius:7px;font-family:'Space Mono',monospace;font-weight:700;font-size:14px;color:var(--azul-d);text-align:center;outline:none;transition:border-color .2s;-moz-appearance:textfield;appearance:textfield}
.qty-edit::-webkit-outer-spin-button,.qty-edit::-webkit-inner-spin-button{-webkit-appearance:none}
.qty-edit:focus{border-color:var(--azul);box-shadow:0 0 0 2px rgba(56,96,178,.12)}
.qty-edit.modified{border-color:var(--nrj);background:#fff8f0}
.toggle-wrap{display:flex;border-radius:8px;overflow:hidden;border:1.5px solid var(--border);width:fit-content}
.toggle-btn{padding:6px 12px;font-size:11px;font-weight:700;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all .15s;background:#f8fafc;color:var(--txt3)}
.toggle-btn.apr.active{background:#d1fae5;color:#065f46;border-right:1.5px solid #6ee7b7}
.toggle-btn.rec.active{background:#fee2e2;color:#7f1d1d}
.toggle-btn:not(.active):hover{background:#f0f0f0}
.linea-rechazada td{opacity:.45;background:#fff5f5}
.linea-rechazada .qty-edit{opacity:.4;pointer-events:none}
.estado{padding:56px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px}
.e-ico{font-size:48px;opacity:.35}.e-txt{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;color:var(--txt3)}.e-sub{font-size:13px;color:var(--txt3);opacity:.7}
.notif{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#2d3748;color:white;padding:12px 22px;border-radius:12px;font-size:13px;font-weight:600;z-index:9999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);max-width:90vw;text-align:center;box-shadow:0 8px 28px rgba(0,0,0,.22)}
.notif.show{transform:translateX(-50%) translateY(0)} .notif.error{background:var(--rojo)} .notif.success{background:var(--verde)}
@media(max-width:700px){.f-grid{grid-template-columns:1fr 1fr}.kpi-row{grid-template-columns:1fr 1fr}}
@media(max-width:500px){.f-grid{grid-template-columns:1fr}.kpi-row{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="topbar">
  <button class="tb-back" onclick="irAlMenu()">← Menú</button>
  <div class="tb-logo">RESERVAS</div>
  <div class="tb-user">👔 <span id="tb-user">—</span></div>
</div>

<div class="page">
  <div>
    <div class="page-title">Aprobar Reservas de Materiales</div>
    <div class="page-sub">Revisa y aprueba las solicitudes pendientes de los mecánicos</div>
  </div>

  <div class="card">
    <div class="card-hdr"><div class="card-ttl"><span class="dot" style="background:var(--azul)"></span> Filtros</div></div>
    <div class="f-grid">
      <div class="f-grp"><label class="f-lbl">Fecha Desde</label><input type="date" id="f-desde" class="f-inp"></div>
      <div class="f-grp"><label class="f-lbl">Fecha Hasta</label><input type="date" id="f-hasta" class="f-inp"></div>
      <div class="f-grp"><label class="f-lbl">Mecánico (código o nombre)</label>
        <input type="text" id="f-mec-txt" class="f-inp" placeholder="Buscar por código o nombre…">
      </div>
      <div class="f-grp"><label class="f-lbl">Supervisor</label>
        <select id="f-sup" class="f-inp"><option value="">— Todos —</option></select>
      </div>
    </div>
    <div class="f-btns">
      <button class="btn-b" id="btnB" onclick="buscar()">
        <span id="bico">🔍</span><span id="btxt">Buscar Pendientes</span>
      </button>
    </div>
  </div>

  <div class="kpi-row" id="kpis" style="display:none">
    <div class="kpi a"><div class="kpi-val" id="k0">0</div><div class="kpi-lbl">Solicitudes</div></div>
    <div class="kpi n"><div class="kpi-val" id="k1">0</div><div class="kpi-lbl">OTs involucradas</div></div>
    <div class="kpi v"><div class="kpi-val" id="k2">0</div><div class="kpi-lbl">Artículos totales</div></div>
  </div>

  <div class="card" id="card-res" style="display:none">
    <div class="card-hdr">
      <div class="card-ttl"><span class="dot" style="background:var(--nrj)"></span> Reservas Pendientes</div>
      <span id="res-cnt" style="font-family:'Space Mono',monospace;font-size:11px;color:var(--txt3)"></span>
    </div>
    <div class="grupos" id="grupos"></div>
  </div>

  <div class="estado" id="evacio">
    <div class="e-ico">🔍</div>
    <div class="e-txt">Selecciona un rango y presiona Buscar</div>
    <div class="e-sub">Solo se muestran reservas pendientes de aprobación</div>
  </div>
</div>

<div id="notif" class="notif"></div>

<script>
const SB_URL = 'https://rzcfrjgwxhgwslwvtbbe.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ6Y2Zyamd3eGhnd3Nsd3Z0YmJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MzA2NjIsImV4cCI6MjA4ODMwNjY2Mn0.hWg2jS8q_X6xIbfMIYGU7Bp7JcJhpYbQwJEB4ZaSjrs';

function irAlMenu(){
  const rol=(userActual?.rol||getSession()?.rol||'').toUpperCase();
  if(rol==='JEFE') window.location.href='menu_jefe.html';
  else window.location.href='menu_supervisor.html';
}

async function sbGet(p){ const r=await fetch(`${SB_URL}/rest/v1/${p}`,{headers:{apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`}}); if(!r.ok) throw new Error(await r.text()); return r.json(); }

let colabs={}, grupos={}, mecsPorSup={};
let mecPermitidos=null; // null = sin restricción (JEFE), Set = solo estos códigos
let userActual=null;
// grupos = { gid: { key, fecha, ot, cod, nombre, lineas:[{id, ...row}] } }

window.onload = async () => {
  const u = getSession();
  if (!u) { window.location.href='index.html'; return; }
  if ((u.rol||'').toUpperCase()!=='SUPERVISOR'&&(u.rol||'').toUpperCase()!=='JEFE') { window.location.href='menu_mecanico.html'; return; }
  userActual=u;
  document.getElementById('tb-user').textContent = u.nombre;
  const hoy=new Date(), d7=new Date(); d7.setDate(hoy.getDate()-7);
  document.getElementById('f-desde').value = d7.toISOString().slice(0,10);
  document.getElementById('f-hasta').value = hoy.toISOString().slice(0,10);
  await cargarColabs();
};

async function cargarColabs() {
  try {
    const rol=(userActual?.rol||'').toUpperCase();
    const esJefe=rol==='JEFE';
    // Jefe carga todos los colaboradores para poder filtrar por supervisor
    // Supervisor carga solo sus mecánicos
    const queryTodos = esJefe
      ?'Colaboradores?select=codigo,nombre,rol,jefe_codigo&order=nombre.asc'
      :`Colaboradores?select=codigo,nombre,rol,jefe_codigo&order=nombre.asc`;
    const data = await sbGet(queryTodos);
    const selSup = document.getElementById('f-sup');
    const mecanicos = [];
    (data||[]).forEach(c=>{
      colabs[String(c.codigo)]=c.nombre;
      const rol=(c.rol||'').toUpperCase();
      if(rol==='SUPERVISOR'){
        const o=document.createElement('option');o.value=c.codigo;o.textContent=`${c.nombre} (${c.codigo})`;selSup.appendChild(o);
      }
      if(rol==='MECANICO'){
        mecanicos.push(c);
        if(c.jefe_codigo){
          const jefe=String(c.jefe_codigo);
          if(!mecsPorSup[jefe])mecsPorSup[jefe]=new Set();
          mecsPorSup[jefe].add(String(c.codigo));
        }
      }
    });
    // mecPermitidos: null = ve todos, Set = solo esos mecánicos
    if(esJefe){
      mecPermitidos = null; // jefe ve todo
    } else {
      // Verificar si está de guardia activa — si sí, ve todos
      const guardiaNow = await obtenerGuardiaActiva();
      if(guardiaNow && String(guardiaNow.supervisor_codigo)===String(userActual.codigo)){
        mecPermitidos = null; // supervisor de guardia ve todos
      } else {
        mecPermitidos = new Set(mecanicos.filter(m=>String(m.jefe_codigo)===String(userActual.codigo)).map(m=>String(m.codigo)));
      }
    }
  } catch(e){ console.warn('colabs',e.message); }
}

async function obtenerGuardiaActiva() {
  const ahora = new Date();
  // Usar hora LOCAL del dispositivo (GMT-6) — evita desfase con UTC
  const fechaHoy = isoHoy();
  const hh = String(ahora.getHours()).padStart(2,'0');
  const mm = String(ahora.getMinutes()).padStart(2,'0');
  const ss = String(ahora.getSeconds()).padStart(2,'0');
  const horaAhora = `${hh}:${mm}:${ss}`;
  try {
    const data = await sbGet(`guardias?activa=eq.true&fecha_inicio=lte.${fechaHoy}&fecha_fin=gte.${fechaHoy}&select=*`);
    if (!data || !data.length) return null;
    // Filtrar por hora actual
    const activa = data.find(g => {
      const hI = g.hora_inicio, hF = g.hora_fin;
      if (hF > hI) return horaAhora >= hI && horaAhora <= hF;
      // cruza medianoche
      return horaAhora >= hI || horaAhora <= hF;
    });
    return activa || null;
  } catch(e) { return null; }
}

async function buscar() {
  const desde = document.getElementById('f-desde').value;
  const hasta  = document.getElementById('f-hasta').value;
  const mecTxt = document.getElementById('f-mec-txt').value.trim().toLowerCase();
  const supFil = document.getElementById('f-sup').value;

  const p = ['select=*','sup_aprueba=is.null'];
  const rol = (userActual?.rol||'').toUpperCase();
  let esGuardia = false;

  if (rol === 'SUPERVISOR') {
    const guardia = await obtenerGuardiaActiva();
    if (guardia) {
      const esElDeGuardia = String(guardia.supervisor_codigo) === String(userActual.codigo);
      if (esElDeGuardia) {
        // ES el supervisor de guardia — ve TODOS los mecánicos sin restricción
        // No aplicar filtro mecPermitidos
        esGuardia = true;
      } else {
        // NO es el de guardia — solo ve reservas creadas ANTES de que empezara la guardia
        p.push(`created_at=lt.${guardia.fecha_inicio}T${guardia.hora_inicio}`);
      }
    }
  }

  if (desde) p.push(`fecha_reserva=gte.${desde}`);
  if (hasta)  p.push(`fecha_reserva=lte.${hasta}`);

  // Filtrar por mecánicos solo si NO está de guardia
  if (!esGuardia && mecPermitidos && mecPermitidos.size > 0) {
    p.push(`codigo_operario=in.(${[...mecPermitidos].join(',')})`);
  }
  p.push('order=fecha_reserva.desc,ot.asc,id.asc');

  setLoad(true);
  document.getElementById('kpis').style.display='none';
  document.getElementById('card-res').style.display='none';
  document.getElementById('evacio').style.display='none';

  try {
    const rows = await sbGet(`reservas?${p.join('&')}`);
    rows.forEach(r=>{ r.articulohana = r.articulohana||''; });

    setLoad(false);

    grupos = {};
    (rows||[]).forEach(r => {
      // Clave única por fecha + ot + operario
      const key = `${r.fecha_reserva}__${r.ot}__${r.codigo_operario}`;
      if (!grupos[key]) {
        grupos[key] = {
          key,
          gid: key, // usamos la key directamente como gid — sin btoa()
          fecha: r.fecha_reserva,
          ot: r.ot,
          cod: String(r.codigo_operario),
          nombre: colabs[String(r.codigo_operario)] || r.codigo_operario || '—',
          lineas: []
        };
      }
      grupos[key].lineas.push(r); // cada linea conserva su id real de BD
    });

    const listaGrupos = Object.values(grupos);

    if (!listaGrupos.length) {
      setEstado('😊','Sin reservas pendientes','Todas las solicitudes han sido aprobadas');
      document.getElementById('kpis').style.display='grid';
      renderKPIs([]);
      return;
    }

    renderKPIs(rows||[]);
    renderGrupos(listaGrupos);
    document.getElementById('kpis').style.display='grid';
    document.getElementById('card-res').style.display='block';

  } catch(e) {
    setLoad(false);
    setEstado('❌','Error al consultar',e.message);
    notify(e.message,'error');
  }
}

function setLoad(v){
  document.getElementById('bico').innerHTML = v?'<span class="spin"></span>':'🔍';
  document.getElementById('btxt').textContent = v?'Cargando…':'Buscar Pendientes';
  document.getElementById('btnB').disabled=v;
}

function renderKPIs(rows) {
  const ots = new Set(rows.map(r=>r.ot).filter(Boolean));
  document.getElementById('k0').textContent = rows.length;
  document.getElementById('k1').textContent = ots.size;
  document.getElementById('k2').textContent = rows.reduce((s,r)=>s+(parseFloat(r.cantidad)||0),0).toFixed(0);
}

function setEstado(ico,txt,sub){
  const el=document.getElementById('evacio');
  el.querySelector('.e-ico').textContent=ico;
  el.querySelector('.e-txt').textContent=txt;
  el.querySelector('.e-sub').textContent=sub;
  el.style.display='flex';
}

// ── Sanitiza la key para usarla como id de elemento HTML ──
function keyToHtmlId(key){
  return key.replace(/[^a-zA-Z0-9]/g,'_');
}

function renderGrupos(listaGrupos) {
  const container = document.getElementById('grupos');
  container.innerHTML='';
  document.getElementById('res-cnt').textContent = `${listaGrupos.length} grupo${listaGrupos.length!==1?'s':''}`;

  listaGrupos.forEach(g => {
    const hid = keyToHtmlId(g.key); // ID seguro para HTML
    const div = document.createElement('div');
    div.className='grupo'; div.id=`g-${hid}`;

    const linRows = g.lineas.map((l, i) => `
      <tr id="lin-row-${hid}-${i}">
        <td class="td-cod">${l.articulohana||'—'}</td>
        <td>${l.descripcion||'—'}</td>
        <td>
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
            <span class="td-qty-orig" title="Cantidad solicitada">📋 ${l.cantidad}</span>
            <span class="qty-arrow">→</span>
            <input class="qty-edit" type="number" id="qty-sup-${hid}-${i}"
              value="${l.cantidad}" min="0.01" step="0.01">
          </div>
        </td>
        <td class="td-um">${l.um||'—'}</td>
        <td>
          <div class="toggle-wrap">
            <button class="toggle-btn apr active" id="tbnapr-${hid}-${i}"
              onclick="setEstadoLinea('${hid}',${i},'Aprobado')">✔ Aprobado</button>
            <button class="toggle-btn rec" id="tbnrec-${hid}-${i}"
              onclick="setEstadoLinea('${hid}',${i},'Rechazado')">✖ Rechazado</button>
          </div>
        </td>
      </tr>`).join('');

    div.innerHTML=`
      <div class="grupo-hdr">
        <div class="grupo-info">
          <span class="grupo-ot">OT ${g.ot}</span>
          <span class="grupo-mec">👷 ${g.nombre}</span>
          <span style="font-family:'Space Mono',monospace;font-size:11px;color:var(--txt3);background:var(--azul-bg);border:1px solid var(--bord2);border-radius:12px;padding:2px 8px">Cód: ${g.cod}</span>
          <span class="grupo-meta">${g.fecha}</span>
          <span style="font-family:'Space Mono',monospace;font-size:11px;color:var(--txt3)">${g.lineas.length} artículo${g.lineas.length!==1?'s':''}</span>
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <button class="btn-rechazar-todo" onclick="rechazarTodo('${hid}',${g.lineas.length})">✖ Rechazar Todo</button>
          <button class="btn-aprobar" id="ba-${hid}" onclick="aprobarGrupo('${hid}')">✅ Confirmar</button>
        </div>
      </div>
      <div style="overflow-x:auto">
        <table class="lineas-tbl">
          <thead><tr><th>Código SAP</th><th>Descripción</th><th>Cant. Solicitada → Supervisor</th><th>UM</th><th>Decisión</th></tr></thead>
          <tbody>${linRows}</tbody>
        </table>
      </div>`;
    container.appendChild(div);
  });
}

function setEstadoLinea(hid, idx, estado) {
  const row  = document.getElementById(`lin-row-${hid}-${idx}`);
  const bapr = document.getElementById(`tbnapr-${hid}-${idx}`);
  const brec = document.getElementById(`tbnrec-${hid}-${idx}`);
  if (!row) return;
  if (estado==='Aprobado') {
    bapr.classList.add('active'); brec.classList.remove('active');
    row.classList.remove('linea-rechazada');
  } else {
    brec.classList.add('active'); bapr.classList.remove('active');
    row.classList.add('linea-rechazada');
  }
}

function rechazarTodo(hid, numLineas) {
  for (let i=0; i<numLineas; i++) setEstadoLinea(hid, i, 'Rechazado');
  notify('Todas las líneas marcadas como Rechazado — presiona Confirmar para guardar','warning');
}

async function aprobarGrupo(hid) {
  const btn = document.getElementById(`ba-${hid}`);
  btn.disabled=true;
  btn.innerHTML='<span class="spin" style="border-top-color:#2e9e4f;border-color:rgba(46,158,79,.3)"></span> Guardando…';
  btn.style.background='#f0fff4'; btn.style.color='#276040';

  // Reconstruir la key original desde el hid (reemplazar _ de vuelta)
  // En realidad lo más simple: buscar el grupo por su hid en el objeto grupos
  const grupoKey = Object.keys(grupos).find(k => keyToHtmlId(k) === hid);
  if (!grupoKey) { notify('Error: grupo no encontrado','error'); btn.disabled=false; return; }
  const g = grupos[grupoKey];

  try {
    // Actualizar cada línea usando su id real de BD — no hay confusión de orden
    const promises = g.lineas.map((row, i) => {
      const qtyEl  = document.getElementById(`qty-sup-${hid}-${i}`);
      const aprBtn = document.getElementById(`tbnapr-${hid}-${i}`);
      const decision  = aprBtn?.classList.contains('active') ? 'Aprobado' : 'Rechazado';
      const cantSup   = parseFloat(qtyEl?.value || row.cantidad);

      return fetch(
        `${SB_URL}/rest/v1/reservas?id=eq.${row.id}`,
        {
          method: 'PATCH',
          headers: { apikey:SB_KEY, Authorization:`Bearer ${SB_KEY}`,
            'Content-Type':'application/json', Prefer:'return=minimal' },
          body: JSON.stringify({
            verificacionsupervisor: decision,
            cantidadsupervisor: decision === 'Aprobado' ? String(cantSup) : null,
            sup_aprueba: decision === 'Aprobado' ? true : false,
            supervisor_codigo: String(userActual.codigo),
            supervisor_nombre: userActual.nombre,
            fecha_aprobacion: new Date().toISOString()
          })
        }
      ).then(r => { if(!r.ok) throw new Error(`Línea ${i+1}: ${r.statusText}`); });
    });

    await Promise.all(promises);

    btn.innerHTML='✅ Confirmado'; btn.className='btn-aprobar done';
    notify(`OT ${g.ot} procesada correctamente ✅`, 'success');

    // Quitar el grupo del DOM y del objeto grupos
    setTimeout(() => {
      document.getElementById(`g-${hid}`)?.remove();
      delete grupos[grupoKey];

      const restantes = Object.values(grupos);
      // Recalcular KPIs con las líneas que quedan
      const todasLineas = restantes.flatMap(gr => gr.lineas);
      renderKPIs(todasLineas);

      const numGrupos = restantes.length;
      document.getElementById('res-cnt').textContent = `${numGrupos} grupo${numGrupos!==1?'s':''}`;

      if (numGrupos === 0) {
        document.getElementById('card-res').style.display='none';
        setEstado('😊','¡Todo procesado!','No quedan reservas pendientes');
      }
    }, 700);

  } catch(e) {
    btn.disabled=false;
    btn.innerHTML='✅ Confirmar';
    btn.style.background=''; btn.style.color='';
    notify('Error: '+e.message, 'error');
  }
}

let nTO;
function notify(msg,type='info'){const el=document.getElementById('notif');el.textContent=msg;el.className='notif '+type;void el.offsetWidth;el.classList.add('show');clearTimeout(nTO);nTO=setTimeout(()=>el.classList.remove('show'),5000);}
</script>
