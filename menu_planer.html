<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MANODEOBRA – Menú Planner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="config.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"DM Sans",sans-serif;background:#1a1035;min-height:100vh;display:flex;flex-direction:column}
.header{padding:32px 24px 20px;display:flex;flex-direction:column;gap:6px}
.badge-rol{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,0.1);border:1.5px solid rgba(255,255,255,0.2);border-radius:10px;padding:6px 14px;width:fit-content}
.badge-emoji{font-size:18px}
.badge-txt{font-family:"Space Mono",monospace;font-size:13px;font-weight:700;color:white;letter-spacing:1px}
.user-name{font-size:22px;font-weight:700;color:white;margin-top:4px}
.menu-label{font-family:"Space Mono",monospace;font-size:26px;font-weight:700;color:white;letter-spacing:3px;margin-top:2px}
.btns{padding:8px 16px 24px;display:flex;flex-direction:column;gap:12px;flex:1}
.btn{display:flex;align-items:center;gap:18px;background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.12);border-radius:18px;padding:20px 24px;cursor:pointer;transition:all 0.2s;text-align:left;width:100%;color:white;font-family:"DM Sans",sans-serif;text-decoration:none}
.btn:hover{background:rgba(167,139,250,0.15);border-color:rgba(167,139,250,0.4);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.3)}
.btn-icon{font-size:34px;flex-shrink:0}
.btn-label{font-size:17px;font-weight:700;display:block}
.btn-desc{font-size:12px;color:rgba(255,255,255,0.5);display:block;margin-top:3px}
.btn-logout{background:none;border:none;color:rgba(255,255,255,0.4);font-size:13px;cursor:pointer;padding:8px 16px;border-radius:8px;font-family:"DM Sans",sans-serif;display:flex;align-items:center;gap:7px;transition:all 0.2s;margin:0 8px 16px}
.btn-logout:hover{color:white;background:rgba(255,0,0,0.2)}
</style>
</head>
<body>
<div class="header">
  <div class="badge-rol"><span class="badge-emoji">📊</span><span class="badge-txt">PLANER</span></div>
  <div class="user-name" id="user-name">—</div>
  <div class="menu-label">MENÚ</div>
</div>
<div class="btns">
  <a class="btn" href="planner_requerimientoes.html">
    <div class="btn-icon">📋</div>
    <div>
      <span class="btn-label">Requerimientoes</span>
      <span class="btn-desc">Gestionar solicitudes aprobadas — seguimiento, confirmar, cancelar</span>
    </div>
  </a>
</div>
<button class="btn-logout" onclick="cerrar()">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
  Cerrar sesión
</button>
<script>
window.onload=()=>{
  const u=getSession();
  if(!u){window.location.href="index.html";return;}
  if((u.rol||"").toUpperCase()!=="PLANER"){window.location.href="index.html";return;}
  document.getElementById("user-name").textContent=u.nombre;
};
function cerrar(){clearSession();window.location.href="index.html";}
</script>
</body>
</html>
